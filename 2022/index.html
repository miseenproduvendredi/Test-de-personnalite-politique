    :'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#e8f5e9;color:#1b5e20;flex-shrink:0;margin-top:2px;white-space:nowrap">Pour</span>';

    ?'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#0d1a35;color:#7eb3f8;flex-shrink:0;margin-top:2px;white-space:nowrap">Contre</span>'
    :'<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;background:#e3f2fd;color:#1565c0;flex-shrink:0;margin-top:2px;white-space:nowrap">Contre</span>';

}

const SR={eco:[{l:"OFCE – Sciences Po",u:"https://www.ofce.sciences-po.fr"},{l:"France Stratégie",u:"https://www.strategie.gouv.fr"}],imm:[{l:"OFPRA",u:"https://www.ofpra.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],sec:[{l:"IHEMI",u:"https://www.ihemi.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],eu:[{l:"Toute l'Europe",u:"https://www.touteleurope.eu"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],ecol:[{l:"Haut Conseil pour le Climat",u:"https://www.hautconseilclimat.fr"},{l:"ADEME",u:"https://www.ademe.fr"}],soc:[{l:"DREES",u:"https://drees.solidarites-sante.gouv.fr"},{l:"Cour des Comptes",u:"https://www.ccomptes.fr"}],soc2:[{l:"CCNE",u:"https://www.ccne-ethique.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],dem:[{l:"CEVIPOF – Sciences Po",u:"https://www.sciencespo.fr/cevipof"},{l:"Conseil Constitutionnel",u:"https://www.conseil-constitutionnel.fr"}],val:[{l:"INSEE",u:"https://www.insee.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],int:[{l:"IRSEM",u:"https://www.irsem.fr"},{l:"Institut Montaigne",u:"https://www.institutmontaigne.org"}],edu:[{l:"Ministère Éducation – DEPP",u:"https://www.education.gouv.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}],agr:[{l:"INSEE Agreste",u:"https://agreste.agriculture.gouv.fr"},{l:"INRAE",u:"https://www.inrae.fr"}],num:[{l:"CNIL",u:"https://www.cnil.fr"},{l:"Vie-publique.fr",u:"https://www.vie-publique.fr"}]};

// QD structure: [question_text, context_factual, arg_pour, arg_contre, srcKey]
// question_text = normative statement to react to
// context_factual = factual background (shown separately, not as question)
const QD=[
["L'État doit augmenter les dépenses publiques pour améliorer les services publics, quitte à creuser davantage la dette.","La dette française dépasse 110 % du PIB (~3 000 Mds€). Les dépenses publiques financent santé, éducation, transports et sécurité.","Ses partisans estiment que l'investissement public améliore le niveau de vie, réduit les inégalités et soutient la croissance économique à long terme.","Ses opposants estiment que la maîtrise de la dette protège les générations futures, préserve la crédibilité financière de la France et laisse des marges de manœuvre en cas de crise.","eco"],
["L'âge légal de départ à la retraite doit être abaissé à 60 ans pour les carrières longues.","L'âge légal de retraite était 60 ans jusqu'en 2010, 62 ans depuis, 64 ans depuis 2023. Pénibilité, espérance de vie en bonne santé et financement du système sont au cœur du débat.","Ses partisans estiment qu'un départ plus précoce est une juste reconnaissance de la pénibilité de certains métiers et permet aux travailleurs de profiter de leur retraite en bonne santé.","Ses opposants estiment que l'allongement progressif de la durée de cotisation est nécessaire pour assurer la viabilité financière du système et son équité entre générations.","eco"],
["Le Salaire Minimum Interprofessionnel de Croissance (SMIC) doit être augmenté à 1 500 € nets minimum.","Le SMIC brut était environ 1 600 € en 2022. Il concerne directement 2,5 millions de travailleurs.","Ses partisans estiment qu'une hausse significative améliore le pouvoir d'achat des ménages les plus modestes et contribue à réduire les inégalités salariales.","Ses opposants estiment qu'une hausse trop rapide peut fragiliser les secteurs à faibles marges et les très petites entreprises, avec un risque de réduction des embauches.","eco"],
["Un Impôt sur la Fortune (ISF) doit être rétabli pour les très hauts patrimoines.","L'Impôt de Solidarité sur la Fortune (ISF) a été supprimé en 2018 et remplacé par l'Impôt sur la Fortune Immobilière (IFI), limité à l'immobilier. Il concernait les patrimoines supérieurs à 1,3 million d'euros.","Ses partisans estiment que rétablir un impôt sur l'ensemble du patrimoine est un instrument de justice fiscale permettant de contribuer à une meilleure redistribution des richesses.","Ses opposants estiment que la suppression de cet impôt a favorisé le maintien des capitaux en France et encourage l'investissement dans les entreprises et l'économie productive.","eco"],
["Il faut réduire les prélèvements obligatoires pesant sur les entreprises pour favoriser la compétitivité.","Les prélèvements obligatoires pesant sur les entreprises comprennent principalement les cotisations sociales patronales (retraites, maladie, chômage, accidents du travail), mais aussi diverses taxes et impôts (taxe sur les salaires, CFE, CVAE…). Leur niveau global est parmi les plus élevés d'Europe.","Ses partisans estiment que réduire l'ensemble de ces prélèvements améliore la compétitivité des entreprises françaises, allège le coût du travail et favorise les créations d'emplois.","Ses opposants estiment que le niveau actuel de ces prélèvements garantit le financement du modèle de protection sociale et de services publics dont bénéficient l'ensemble des salariés et des citoyens.","eco"],
["La France doit protéger ses industries stratégiques de la concurrence internationale.","La France a perdu environ 2 millions d'emplois industriels en trente ans. Le débat porte sur le rôle de l'État dans la stratégie économique nationale face à la concurrence mondiale.","Ses partisans estiment que protéger les secteurs stratégiques préserve l'emploi national, assure une souveraineté économique et évite une dépendance excessive à l'égard de fournisseurs étrangers dans des domaines sensibles.","Ses opposants estiment que l'ouverture à la concurrence internationale stimule l'innovation, maintient les prix à la consommation à un niveau raisonnable et renforce la compétitivité des entreprises françaises.","eco"],
["L'État est trop présent dans la vie économique et doit laisser davantage de place à l'initiative privée.","La France consacre environ 57 % de son PIB aux dépenses publiques, l'un des taux les plus élevés au monde. Le rôle de l'État dans l'économie est un clivage politique fondamental.","Ses partisans estiment que réduire le poids de l'État libère l'initiative individuelle, stimule l'entrepreneuriat et améliore l'efficacité économique globale.","Ses opposants estiment que l'intervention de l'État garantit l'accès universel aux services essentiels, réduit les inégalités et assure une protection collective contre les aléas du marché.","eco"],
["Les flux migratoires vers la France doivent être fortement réduits.","La France délivre environ 270 000 titres de séjour par an. L'immigration est un phénomène multiforme : travail, regroupement familial, études, protection internationale.","Ses partisans estiment qu'une politique migratoire plus sélective et mieux contrôlée permet d'assurer une intégration de meilleure qualité, d'adapter les flux aux capacités d'accueil du pays et de maintenir la cohésion sociale.","Ses opposants estiment que l'immigration contribue à l'économie française, compense les déficits démographiques dans certains secteurs, et que la France a des engagements humanitaires et internationaux qui encadrent la gestion des flux.","imm"],
["Le droit du sol doit être supprimé ou fortement restreint.","Le droit du sol permet d'obtenir la nationalité française en étant né sur le territoire français de parents étrangers. Il coexiste avec le droit du sang (nationalité transmise par les parents) depuis la fin du XIXe siècle.","Ses partisans estiment que restreindre le droit du sol permet de mieux conditionner l'attribution de la nationalité à une démarche d'intégration effective et volontaire.","Ses opposants estiment que le droit du sol, inscrit dans la tradition républicaine française depuis plus d'un siècle, favorise l'intégration des enfants nés sur le sol national et leur pleine appartenance à la communauté nationale.","imm"],
["L'intégration des personnes immigrées nécessite davantage de moyens publics.","Le taux d'emploi des personnes immigrées est inférieur d'environ 10 points à la moyenne nationale. L'intégration touche le logement, l'emploi, la langue et l'éducation.","Ses partisans estiment qu'investir dans l'intégration — formation linguistique, accès à l'emploi, accompagnement social — est efficace pour la cohésion nationale et bénéfique économiquement pour la société dans son ensemble.","Ses opposants estiment que conditionner l'accueil à des critères préalables d'intégration permet de mieux cibler les ressources disponibles et d'assurer une insertion plus durable.","imm"],
["Les peines de prison doivent être significativement alourdies pour les crimes graves.","La France compte environ 74 000 détenus pour 60 000 places. Le taux de récidive est estimé à environ 40 % dans les cinq ans suivant la libération.","Ses partisans estiment que des peines plus sévères ont un effet dissuasif sur les crimes graves et répondent à l'attente de protection de la société et de justice pour les victimes.","Ses opposants estiment que renforcer les dispositifs de réinsertion — accompagnement psychologique, emploi, formation en détention — est la voie la plus efficace pour réduire durablement la récidive.","sec"],
["La France doit recruter davantage de forces de l'ordre.","La France compte environ 150 000 policiers et gendarmes. Les forces de l'ordre couvrent des missions de sécurité publique, de police judiciaire, de lutte contre la criminalité et de maintien de l'ordre.","Ses partisans estiment que davantage de forces de l'ordre améliore la présence sur le terrain, renforce le sentiment de sécurité dans les quartiers et permet une réponse plus rapide aux infractions.","Ses opposants estiment qu'une approche sociale et préventive — éducation, travail social, politique de la ville — est plus efficace pour réduire la délinquance à long terme.","sec"],
["La légalisation du cannabis à usage récréatif doit être envisagée.","Le cannabis est consommé par environ 5 millions de Français. Il est classé comme stupéfiant. La légalisation à des fins récréatives existe dans plusieurs pays (Canada, Pays-Bas, certains États américains).","Ses partisans estiment que la légalisation encadrée permet de contrôler la qualité du produit, de réduire les trafics criminels, de dégager des recettes fiscales et de traiter la consommation comme un enjeu de santé publique.","Ses opposants estiment que maintenir l'interdiction envoie un signal clair sur les risques sanitaires liés au cannabis, notamment pour les jeunes, et évite de normaliser l'usage d'une substance psychoactive.","sec"],
["La France doit récupérer des compétences souveraines vis-à-vis de l'Union européenne.","Depuis le traité de Maastricht (1992), la France a transféré à l'UE des compétences importantes : politique monétaire, commerciale, règles budgétaires (Pacte de stabilité).","Ses partisans estiment que récupérer certaines compétences permettrait à la France de mener des politiques plus adaptées à ses besoins spécifiques et de restaurer un contrôle démocratique direct sur ces décisions.","Ses opposants estiment que ces transferts permettent à la France de peser davantage dans les négociations mondiales et de bénéficier d'un espace économique intégré plus efficace qu'en agissant seule.","eu"],
["L'Union européenne est globalement bénéfique pour la France.","La France est le 2e bénéficiaire net des fonds structurels européens. L'UE représente environ 60 % du commerce extérieur français. Les politiques européennes couvrent de nombreux domaines : agriculture, commerce, environnement, concurrence.","Ses partisans estiment que l'Union européenne garantit la paix sur le continent depuis 80 ans, crée des solidarités économiques, protège les droits des citoyens et renforce le poids de la France dans les négociations mondiales.","Ses opposants estiment que certaines règles européennes, notamment en matière budgétaire et commerciale, limitent la capacité des États membres à mener des politiques souveraines adaptées à leur situation propre.","eu"],
["La transition écologique doit être une priorité absolue, même si elle implique des efforts économiques importants.","Le GIEC préconise une réduction de 45 % des émissions mondiales d'ici 2030. La France vise la neutralité carbone en 2050. Le coût de la transition est estimé à 50–100 milliards d'euros par an.","Ses partisans estiment que faire de la transition écologique une priorité absolue est la seule voie pour éviter des catastrophes climatiques dont le coût humain et économique serait bien supérieur aux investissements nécessaires.","Ses opposants estiment qu'une transition dont le rythme n'est pas adapté aux capacités économiques risque de peser disproportionnellement sur les ménages modestes et d'affaiblir la compétitivité de l'économie française.","ecol"],
["L'énergie nucléaire doit rester une composante importante du mix énergétique français.","La France produit environ 70 % de son électricité par fission nucléaire, ce qui lui confère un des bilans carbone les plus bas d'Europe pour la production d'électricité.","Ses partisans estiment que l'énergie nucléaire garantit une électricité peu carbonée, une indépendance énergétique durable et des prix stables, constituant un atout central pour la transition climatique et l'industrie.","Ses opposants estiment qu'il faut accélérer la transition vers les énergies renouvelables, en raison des risques d'accident, des défis liés à la gestion des déchets radioactifs et du coût croissant du démantèlement.","ecol"],
["Les activités très polluantes doivent être beaucoup plus fortement taxées.","La taxe carbone vise à intégrer le coût environnemental dans le prix des activités polluantes. Son augmentation en 2018 a relancé un vaste débat sur la répartition des efforts entre catégories sociales et secteurs économiques.","Ses partisans estiment que taxer plus fortement les activités polluantes incite efficacement les entreprises et les ménages à modifier leurs comportements et à investir dans des alternatives moins émettrices.","Ses opposants estiment que cette forme de taxation peut pénaliser des ménages qui n'ont pas encore accès à des alternatives abordables, et qu'il faut d'abord rendre ces alternatives accessibles avant d'alourdir les charges.","ecol"],
["Le système de santé doit rester entièrement public, sans aucune privatisation.","La Sécurité Sociale couvre environ 75 % des dépenses de santé. La France dispose d'un des systèmes de santé les plus couvrants au monde, mais fait face à des tensions financières et des inégalités d'accès croissantes.","Ses partisans estiment que maintenir un système entièrement public garantit l'égalité d'accès aux soins pour tous les citoyens, quel que soit leur revenu, et préserve le principe de solidarité nationale.","Ses opposants estiment qu'une part de gestion privée peut améliorer l'efficacité organisationnelle du système, réduire les délais d'attente et moderniser l'offre de soins dans un contexte de contraintes budgétaires.","soc"],
["Les aides sociales (Revenu de Solidarité Active, allocations) doivent être conditionnées à une démarche active de retour à l'emploi.","Le Revenu de Solidarité Active (RSA) concerne environ 2 millions de personnes. La question porte sur les conditions d'attribution des aides sociales et les obligations qui peuvent y être associées.","Ses partisans estiment que conditionner les aides à une démarche d'insertion active — formation, recherche d'emploi — favorise le retour vers l'emploi et accompagne les bénéficiaires dans un parcours de réinsertion.","Ses opposants estiment que les aides sociales doivent soutenir inconditionnellement les personnes en difficulté, dont les obstacles au retour à l'emploi sont souvent structurels : santé, garde d'enfants, discrimination à l'embauche.","soc"],
["L'État doit construire massivement des logements sociaux pour répondre à la crise du logement.","3 millions de ménages sont en attente d'un logement social en France. Les prix immobiliers ont fortement augmenté dans les grandes métropoles, rendant difficile l'accès au logement pour les revenus modestes.","Ses partisans estiment que construire massivement des logements sociaux est le moyen le plus direct pour l'État d'assurer un accès au logement digne pour les ménages les plus modestes, indépendamment des fluctuations du marché.","Ses opposants estiment que simplifier les règles d'urbanisme et libérer le marché immobilier permettrait d'augmenter l'offre globale de logements et de faire baisser les prix au bénéfice de l'ensemble des ménages.","soc"],
["Les signes religieux ostensibles doivent être davantage limités dans l'espace public.","La loi de 1905 pose le principe de séparation de l'Église et de l'État. Elle interdit les signes religieux dans la fonction publique. La laïcité est un principe à valeur constitutionnelle en France.","Ses partisans estiment que limiter davantage les signes religieux dans l'espace public renforce la neutralité commune et permet à chaque citoyen d'interagir dans un cadre partagé, dégagé de toute appartenance communautaire visible.","Ses opposants estiment que les règles actuelles offrent un équilibre satisfaisant et que les étendre davantage porterait atteinte à la liberté de conscience et d'expression religieuse, garanties par la République.","soc2"],
["Le droit au mariage doit être ouvert à tous les couples, quelle que soit leur orientation sexuelle.","Le mariage pour tous a été légalisé en France en 2013, ouvrant le mariage et l'adoption aux couples de même sexe. Il a été précédé d'un vaste débat national et de mobilisations importantes des deux côtés.","Ses partisans estiment que l'égalité des droits doit s'appliquer à tous les couples sans distinction, et que le droit au mariage est un droit fondamental indépendant de l'orientation sexuelle.","Ses opposants estiment que le mariage correspond à une institution fondée sur la complémentarité des sexes et la filiation naturelle, et que d'autres formes de reconnaissance juridique pourraient répondre aux besoins des couples de même sexe.","soc2"],
["Les traditions culturelles établies méritent d'être préservées face aux changements sociaux rapides.","Les sociétés contemporaines connaissent des transformations rapides : modes de vie, structures familiales, repères culturels et valeurs. Ce rythme de changement fait lui-même l'objet d'un débat.","Ses partisans estiment que préserver les traditions culturelles et les repères établis assure la continuité sociale, protège les identités collectives et maintient un cadre de sens partagé entre les générations.","Ses opposants estiment que les évolutions sociales reflètent une adaptation naturelle des valeurs et des droits à la réalité de l'époque, et que la société doit pouvoir se transformer pour mieux répondre aux besoins de ses membres.","val"],
["Le recours au référendum doit être généralisé pour les grandes décisions politiques nationales.","Le référendum est prévu par l'article 11 de la Constitution. Il a été utilisé neuf fois sous la Ve République, dont le dernier en 2005 sur le traité constitutionnel européen (rejeté par les électeurs).","Ses partisans estiment que le recours plus fréquent au référendum renforce la démocratie directe, permet aux citoyens de se prononcer directement sur les grandes orientations nationales et redonne du sens à leur participation politique.","Ses opposants estiment que les décisions complexes requièrent un débat approfondi confié à des représentants élus, et qu'une consultation directe sur des enjeux très techniques peut conduire à des réponses qui ne reflètent pas pleinement la complexité des choix en jeu.","dem"],
["Les institutions de la Ve République doivent être profondément réformées ou remplacées par une 6e République.","La Ve République, fondée en 1958, est un régime semi-présidentiel qui donne des pouvoirs importants au Président. Le Parlement peut être contourné par certains mécanismes constitutionnels (article 49-3, ordonnances).","Ses partisans estiment qu'une réforme profonde des institutions, vers un régime plus parlementaire avec davantage de pouvoirs au Parlement et aux citoyens, renforcerait la légitimité démocratique des décisions collectives.","Ses opposants estiment que la Ve République assure une stabilité gouvernementale nécessaire, permet l'action dans la durée et évite les crises institutionnelles qui ont caractérisé les républiques précédentes.","dem"],
["La liberté individuelle doit primer sur les politiques collectives d'égalisation des conditions de vie.","Le débat entre liberté individuelle et égalité des conditions traverse toute la philosophie politique. Ces deux valeurs sont inscrites dans la tradition républicaine française, mais leur hiérarchie fait l'objet de désaccords profonds.","Ses partisans estiment que la liberté individuelle est le moteur de la prospérité collective : laisser chacun faire ses choix et en assumer les conséquences produit les meilleurs résultats pour la société dans son ensemble.","Ses opposants estiment que des politiques actives de redistribution et d'égalisation des conditions de vie sont nécessaires pour que la liberté formelle soit réelle pour tous, et pas seulement pour ceux qui disposent déjà de ressources suffisantes.","val"],
["Les inégalités économiques constituent le problème le plus urgent à résoudre en France.","Les 10 % des ménages les plus riches détiennent environ 50 % du patrimoine total en France. Les inégalités de patrimoine sont nettement plus fortes que les inégalités de revenus.","Ses partisans estiment que réduire les inégalités économiques est urgent pour des raisons de cohésion sociale, d'égalité des chances et de fonctionnement démocratique : des inégalités excessives fragilisent le lien social et concentrent le pouvoir.","Ses opposants estiment que d'autres priorités — emploi, compétitivité, sécurité — méritent une attention au moins égale, et que l'amélioration du niveau de vie de tous passe d'abord par des politiques d'accès à l'emploi, à l'éducation et à la formation.","val"],
["Un changement social profond est nécessaire et urgent en France.","Les transformations sociales sont permanentes mais leur rythme et leur ampleur sont débattus. La question porte sur l'équilibre souhaitable entre stabilité et changement dans l'organisation de la société.","Ses partisans estiment qu'un changement social profond et rapide est nécessaire pour répondre aux urgences — inégalités, crise écologique, déficit démocratique — et qu'une approche trop graduelle ne permettra pas d'y faire face à temps.","Ses opposants estiment que les réformes progressives et négociées permettent une adaptation maîtrisée de la société, préservent la cohésion sociale et évitent les ruptures dont les effets sont souvent imprévisibles.","val"],
["La France doit augmenter significativement son budget de défense nationale.","La France consacre 2,1 % de son PIB à la défense. Les conflits récents en Europe et l'évolution de l'environnement géopolitique ont relancé les débats sur les capacités militaires.","Ses partisans estiment qu'augmenter le budget de la défense est nécessaire pour assurer la souveraineté nationale, honorer les engagements envers les alliés et adapter les capacités militaires à un contexte géopolitique plus instable.","Ses opposants estiment que les ressources publiques limitées devraient être prioritairement orientées vers les besoins sociaux, la transition écologique et les instruments diplomatiques de prévention des conflits.","int"],
["La mondialisation économique a plutôt été néfaste pour les travailleurs français.","La mondialisation économique a transformé les échanges depuis les années 1990. En France, cette période a coïncidé avec une forte désindustrialisation mais aussi avec une baisse des prix à la consommation et le développement de nouveaux secteurs exportateurs.","Ses partisans estiment que la mondialisation a contribué aux délocalisations, à la perte d'emplois industriels dans des territoires entiers, et a affaibli le pouvoir de négociation des travailleurs face à des entreprises mobiles à l'échelle mondiale.","Ses opposants estiment que l'ouverture économique mondiale a profité aux consommateurs français via des prix plus bas, a créé des débouchés à l'export pour les entreprises compétitives et a contribué au développement de nouveaux secteurs.","int"],
["L'enseignement privé doit recevoir moins de financement public que l'enseignement public.","L'enseignement privé sous contrat avec l'État accueille environ 17 % des élèves français et bénéficie de financements publics, principalement pour les salaires des enseignants, en contrepartie du respect des programmes nationaux.","Ses partisans estiment que réduire les financements publics à l'enseignement privé permettrait de concentrer davantage les ressources sur l'école publique et de renforcer son rôle d'égalisation des chances pour tous les élèves.","Ses opposants estiment que la liberté de l'enseignement est un principe reconnu par la loi, et que financer l'enseignement privé sous contrat est une contrepartie légitime au service qu'il rend en éduquant une partie significative des élèves français.","edu"],
["L'école doit davantage valoriser la discipline, l'effort et l'autorité des enseignants.","Les débats pédagogiques portent sur la manière d'enseigner, les méthodes, les programmes et les finalités de l'école. Ces questions font l'objet de travaux de recherche et de positions politiques contrastées depuis des décennies.","Ses partisans estiment que valoriser davantage la discipline, l'effort et l'autorité de l'enseignant permet de mieux transmettre les savoirs fondamentaux, d'établir un cadre structurant et de préparer les élèves à la vie professionnelle et civique.","Ses opposants estiment que les approches fondées sur l'épanouissement personnel, l'autonomie et les compétences transversales permettent aux élèves de développer leur esprit critique et de mieux s'adapter à un monde en évolution.","edu"],
["Les agriculteurs français doivent être davantage protégés et soutenus financièrement par l'État.","Le revenu agricole moyen est d'environ 20 000 € par an, avec de très fortes disparités selon les filières et les régions. Nombreux exploitants peinent à dégager un revenu suffisant face aux coûts de production et aux prix de marché.","Ses partisans estiment que soutenir financièrement les agriculteurs est nécessaire pour assurer la souveraineté alimentaire, maintenir un tissu rural vivant et compenser des normes de production plus contraignantes qu'à l'étranger.","Ses opposants estiment que des réformes structurelles — meilleure régulation des prix à la production, développement des circuits courts, valorisation des produits — permettraient aux agriculteurs de dégager des revenus plus durables.","agr"],
["Les grandes plateformes numériques (Google, Amazon, Meta…) doivent être beaucoup plus strictement régulées.","Les grandes plateformes numériques concentrent des parts de marché considérables dans la publicité, le commerce et la communication. Des questions se posent sur leur impact fiscal, la protection des données et les effets sur la concurrence.","Ses partisans estiment qu'une régulation beaucoup plus stricte est nécessaire pour protéger les données personnelles, combattre les monopoles, assurer une fiscalité équitable et encadrer les effets de ces plateformes sur l'information et la démocratie.","Ses opposants estiment qu'une régulation excessive risque de freiner l'innovation et d'alourdir inutilement des services largement utilisés, et que des cadres réglementaires existent déjà et méritent d'être mieux appliqués avant d'être renforcés.","num"],
["La flat tax (Prélèvement Forfaitaire Unique) sur les revenus du capital doit être supprimée au profit d'une imposition progressive.","La flat tax (PFU à 30 %) sur les revenus du capital — dividendes, plus-values, intérêts — a été instaurée en 2018, remplaçant une imposition au barème progressif de l'impôt sur le revenu.","Ses partisans estiment que revenir à une imposition progressive des revenus du capital rétablit l'équité fiscale entre les contribuables, en traitant les revenus du capital et ceux du travail selon les mêmes principes.","Ses opposants estiment que le PFU a simplifié la fiscalité de l'épargne, encouragé l'investissement dans les entreprises françaises et stabilisé des capitaux qui auraient pu être orientés vers d'autres pays à fiscalité plus favorable.","eco"],
["Un revenu universel de base doit être instauré pour tous les citoyens adultes.","Des expériences de revenu universel ont été conduites dans plusieurs pays (Finlande, certains États américains, Kenya). En France, le coût d'une telle mesure serait estimé entre 400 et 600 milliards d'euros par an.","Ses partisans estiment qu'un revenu universel de base garantirait à chacun un filet de sécurité inconditionnelle, simplifierait le système d'aides sociales et permettrait à chacun de se former, de créer ou de prendre soin de ses proches.","Ses opposants estiment qu'à ce niveau de coût, le financement d'un revenu universel imposerait une fiscalité très lourde sur les actifs, et que ses effets réels sur l'incitation au travail et la réduction de la pauvreté restent à démontrer à grande échelle.","eco"],
["La semaine de travail doit être réduite à 32 heures sans perte de salaire.","La France travaille environ 1 490 heures par an en moyenne, soit moins que la moyenne de l'OCDE (1 750 h). La durée légale du temps de travail est de 35 heures depuis 2000.","Ses partisans estiment que passer à 32 heures améliorerait la qualité de vie des travailleurs, réduirait la fatigue et le stress, et permettrait de mieux partager le travail disponible entre un plus grand nombre de personnes.","Ses opposants estiment qu'une réduction du temps de travail sans perte de salaire représente un coût important pour les entreprises, risque de nuire à la productivité et de fragiliser certains secteurs face à la concurrence internationale.","eco"],
["Les industries énergétiques et les transports doivent être renationalisés.","EDF, le principal opérateur d'électricité, a été renationalisé à 100 % en 2022 après une période de privatisation partielle. La question porte sur le modèle de gestion des industries dites de réseau (énergie, transports ferroviaires).","Ses partisans estiment que la nationalisation de ces industries garantit un service universel, maintient des tarifs accessibles et place l'intérêt général au-dessus des logiques de rentabilité financière à court terme.","Ses opposants estiment que la gestion privée ou mixte favorise l'efficacité opérationnelle, l'investissement et l'innovation, et qu'un opérateur public n'est pas nécessairement mieux géré ni moins coûteux pour les usagers.","eco"],
["Les personnes sans-papiers résidant depuis plus de 5 ans en France doivent pouvoir être régularisées.","Selon des estimations, entre 600 000 et 700 000 personnes seraient en situation irrégulière en France. Certaines y vivent, y travaillent et y ont construit leur vie depuis de nombreuses années.","Ses partisans estiment que régulariser les personnes établies depuis longtemps permet de reconnaître leur réalité sociale, de mettre fin à leur précarité juridique et à leur exposition à l'exploitation, et d'accorder des droits à des personnes déjà intégrées dans la société.","Ses opposants estiment que la régularisation doit rester exceptionnelle pour préserver la cohérence de la politique migratoire, et qu'elle pourrait encourager d'autres personnes à tenter l'entrée irrégulière dans l'espoir d'une future régularisation.","imm"],
["La politique d'asile doit être durcie avec des délais d'instruction raccourcis.","La France instruit environ 150 000 demandes d'asile par an, avec un taux d'accord d'environ 25 %. Les délais d'instruction peuvent dépasser un an, pendant lesquels les demandeurs se trouvent dans une situation de grande incertitude.","Ses partisans estiment que raccourcir les délais d'instruction permet de statuer plus rapidement, de réduire l'incertitude pour tous, et de favoriser une intégration plus rapide des personnes dont la demande est acceptée.","Ses opposants estiment que des délais suffisants sont nécessaires pour un examen rigoureux et équitable de chaque dossier, et qu'une accélération excessive risque de conduire à des décisions défavorables à des personnes qui ont pourtant droit à la protection.","imm"],
["Des peines minimales obligatoires doivent être rétablies pour les délits en récidive.","Le taux de récidive est d'environ 40 % dans les cinq ans après une libération. Les peines minimales obligatoires ont existé en France entre 2007 et 2014, puis ont été supprimées.","Ses partisans estiment que rétablir des peines minimales garantit une réponse pénale prévisible et ferme face à la récidive, et répond à l'attente de la société d'une protection contre les personnes condamnées à plusieurs reprises.","Ses opposants estiment que les peines minimales obligatoires restreignent le pouvoir d'appréciation des magistrats, qui sont les mieux placés pour adapter la sanction à chaque situation individuelle en tenant compte de tous les facteurs.","sec"],
["La France devrait sortir de la zone euro ou en renégocier fondamentalement les règles.","L'euro a été introduit en 1999. La Banque centrale européenne (BCE) fixe la politique monétaire pour les vingt États membres de la zone euro, excluant pour chacun la possibilité de dévaluer sa monnaie ou de fixer ses propres taux d'intérêt.","Ses partisans estiment que sortir de la zone euro ou en renégocier les règles permettrait à la France de retrouver des outils de politique économique — taux de change, politique monétaire — adaptés à sa situation nationale.","Ses opposants estiment que l'euro garantit la stabilité monétaire, protège contre les spéculations sur la dette souveraine, facilite les échanges avec nos partenaires et confère à la France un poids dans les institutions économiques mondiales.","eu"],
["Les pesticides de synthèse doivent être interdits dans l'agriculture française d'ici 2030.","La France est le troisième consommateur européen de pesticides de synthèse. Des études documentent leurs effets sur la biodiversité (insectes pollinisateurs) et la santé humaine (résidus dans l'alimentation et l'eau).","Ses partisans estiment que l'interdiction des pesticides de synthèse d'ici 2030 est nécessaire pour préserver les écosystèmes, protéger la santé des agriculteurs et des riverains et engager l'agriculture dans une trajectoire durable.","Ses opposants estiment qu'une échéance aussi proche ne laisse pas assez de temps pour que des méthodes alternatives efficaces et économiquement viables soient disponibles pour toutes les cultures et tous les territoires français.","ecol"],
["La vente de véhicules thermiques neufs doit être interdite avant 2035.","L'Union européenne a acté l'interdiction de la vente de véhicules thermiques neufs à partir de 2035. La France abrite des constructeurs automobiles majeurs (Renault, Stellantis) et une filière sous-traitante employant des centaines de milliers de personnes.","Ses partisans estiment qu'anticiper cette interdiction accélère la transition vers les véhicules électriques, réduit les émissions du secteur et place l'industrie française en position compétitive sur les marchés d'avenir.","Ses opposants estiment qu'une interdiction avant 2035 menace des emplois dans la filière automobile et ses sous-traitants, et que le calendrier doit être adapté à la capacité réelle de l'industrie et des consommateurs à effectuer cette transition.","ecol"],
["La chasse doit être plus strictement réglementée pour mieux protéger la biodiversité.","La chasse est pratiquée par environ 1,1 million de personnes en France, principalement en milieu rural. Elle est encadrée par un permis de chasser, des dates d'ouverture et des règles de sécurité. Des tensions existent entre chasseurs, défenseurs de l'environnement et autres usagers de la nature.","Ses partisans estiment qu'une réglementation plus stricte est nécessaire pour mieux protéger la biodiversité, améliorer la coexistence avec les autres usagers de la nature et renforcer les règles de sécurité.","Ses opposants estiment que la chasse est une pratique culturelle et traditionnelle ancrée dans les territoires ruraux, qui contribue à la régulation naturelle de certaines espèces et au lien des chasseurs avec leur environnement naturel.","ecol"],
["L'euthanasie active doit être légalisée en France pour les malades en fin de vie.","L'euthanasie active — administration d'une substance létale à la demande d'un patient — est légale en Belgique, aux Pays-Bas, en Espagne et au Canada. En France, la loi Claeys-Leonetti (2016) autorise la sédation profonde mais pas l'injection létale à la demande du patient.","Ses partisans estiment que légaliser l'euthanasie active respecte l'autonomie de la personne, lui permet de choisir les conditions de sa mort dans la dignité et met fin à des souffrances que les soins palliatifs ne peuvent pas toujours soulager.","Ses opposants estiment que la vie humaine mérite d'être protégée jusqu'à son terme naturel, que les soins palliatifs méritent d'être davantage développés, et que la légalisation pourrait exposer des personnes âgées ou vulnérables à des pressions à choisir cette option pour ne pas peser sur leurs proches.","soc2"],
["La prise en charge de la dépendance des personnes âgées doit être intégralement couverte par la Sécurité Sociale.","5 millions de personnes âgées dépendantes sont attendues en 2030. Le reste à charge moyen en établissement médicalisé (EHPAD) est d'environ 1 800 € par mois, souvent supérieur aux pensions de retraite.","Ses partisans estiment que la prise en charge universelle par la Sécurité Sociale garantit que toute personne, quel que soit son patrimoine ou son revenu, puisse être accompagnée dignement dans la dépendance sans peser financièrement sur sa famille.","Ses opposants estiment qu'une couverture intégrale représenterait un coût considérable, et qu'une combinaison de solidarité familiale, d'assurance privée et d'aide publique ciblée sur les plus modestes serait plus soutenable.","soc"],
["L'encadrement des loyers doit être généralisé dans toutes les grandes villes françaises.","L'encadrement des loyers consiste à fixer un loyer de référence au-delà duquel un propriétaire ne peut pas louer. Ce dispositif est en vigueur à Paris et dans quelques autres grandes villes depuis 2015 et 2019.","Ses partisans estiment que l'encadrement des loyers protège les locataires contre des hausses excessives dans les zones tendues, et permet à des ménages à revenus modestes ou intermédiaires de se maintenir dans les centres urbains.","Ses opposants estiment que plafonner les loyers peut décourager certains propriétaires de mettre leur bien en location ou d'y investir, réduisant ainsi l'offre locative disponible et créant des effets non souhaités sur le marché immobilier.","soc"],
["La Procréation Médicalement Assistée (PMA) doit être ouverte à toutes les femmes, y compris les femmes célibataires.","La PMA pour toutes les femmes — y compris les femmes seules et les couples de femmes — a été légalisée en France en 2021, après un long débat parlementaire entamé en 2019.","Ses partisans estiment que l'extension de la PMA à toutes les femmes est une question d'égalité des droits : le désir d'enfant est universel et ne devrait pas dépendre de l'orientation sexuelle ou de la situation familiale.","Ses opposants estiment que cette extension soulève des questions sur les droits de l'enfant à connaître ses deux origines parentales, sur la place symbolique du père dans la famille, et sur les limites que la société souhaite fixer à la médicalisation de la reproduction.","soc2"],
["La Gestation Pour Autrui (GPA) doit rester totalement interdite en France.","La Gestation Pour Autrui (GPA) — porter un enfant pour le compte d'un tiers — est interdite en France mais pratiquée légalement dans plusieurs pays. Des enfants nés par GPA à l'étranger de parents français voient leur filiation reconnue en France depuis 2019.","Ses partisans estiment que la GPA porte atteinte à la dignité de la femme en faisant de la grossesse et de la maternité l'objet d'un contrat, et que même encadrée, elle risque d'ouvrir la voie à des formes de marchandisation du corps humain.","Ses opposants estiment qu'une GPA encadrée, éthique et non commerciale pourrait être légalisée dans un cadre juridique protecteur pour toutes les parties, répondant à des désirs de parentalité légitimes que la société peut choisir d'accompagner.","soc2"],
["La représentation proportionnelle doit être introduite aux élections législatives.","La représentation proportionnelle attribue les sièges en proportion des votes obtenus par chaque parti. Le système actuel (uninominal à deux tours) favorise les partis capables de rassembler une majorité au second tour.","Ses partisans estiment que la proportionnelle garantit une représentation plus fidèle de la diversité des opinions et réduit le phénomène de vote utile, qui conduit des électeurs à ne pas voter pour le parti qu'ils préfèrent réellement.","Ses opposants estiment que la proportionnelle intégrale conduit souvent à des assemblées fragmentées, complique la formation de majorités stables, et peut placer de petits partis en position d'arbitres indispensables à toute coalition gouvernementale.","dem"],
["Le nombre de mandats successifs des élus doit être limité dans le temps.","Le non-cumul des mandats dans le temps vise à éviter qu'un élu occupe le même poste pendant des décennies. Il ne concerne pas le cumul simultané de mandats, déjà encadré par la loi de 2014.","Ses partisans estiment que limiter le nombre de mandats successifs favorise le renouvellement des élus, ouvre la politique à de nouveaux profils et contribue à prévenir les risques de clientélisme liés à l'ancienneté dans un même mandat.","Ses opposants estiment que l'expérience acquise par un élu dans la durée est un atout pour l'efficacité de son action, et que les électeurs sont souverains pour décider de le reconduire ou non dans ses fonctions.","dem"],
["La discrimination positive par quotas est un outil légitime pour corriger les inégalités structurelles.","La discrimination positive consiste à réserver des places ou des postes à des groupes historiquement sous-représentés. En France, le principe d'égalité formelle devant la loi interdit les distinctions fondées sur l'origine, ce qui s'oppose traditionnellement à une telle approche.","Ses partisans estiment que la discrimination positive par quotas est un outil pragmatique pour corriger des inégalités réelles et structurelles que l'égalité formelle seule ne suffit pas à combler, en accélérant la représentation des groupes marginalisés.","Ses opposants estiment que le principe républicain d'universalité — traiter tous les citoyens de manière identique, sans distinction d'origine — est le fondement d'une société juste, et qu'une approche catégorielle risque de renforcer des logiques d'appartenance au détriment de l'égalité individuelle.","val"],
["La France doit rester dans le commandement intégré de l'Organisation du Traité de l'Atlantique Nord (OTAN).","La France a réintégré le commandement militaire intégré de l'OTAN en 2009, après en être sortie en 1966 sous de Gaulle. L'OTAN est une alliance militaire défensive qui compte 32 membres.","Ses partisans estiment que rester dans le commandement intégré de l'OTAN renforce la sécurité collective, permet une mutualisation des capacités militaires et contribue à la dissuasion face aux menaces extérieures.","Ses opposants estiment que la France devrait retrouver une doctrine de défense pleinement autonome, à l'image de la politique gaulliste, lui permettant de définir ses priorités stratégiques de manière indépendante.","int"],
["L'aide publique au développement doit être portée à 0,7 % du Revenu National Brut (RNB), conformément à l'objectif de l'ONU.","La France consacre 0,44 % de son Revenu National Brut (RNB) à l'aide publique au développement, en dessous de l'objectif de 0,7 % fixé par l'ONU depuis 1970 et atteint par plusieurs pays nordiques.","Ses partisans estiment que porter l'aide au développement à 0,7 % du RNB est une expression de la solidarité internationale, contribue à réduire les inégalités mondiales et participe à la prévention des crises — migratoires, sanitaires ou sécuritaires.","Ses opposants estiment que les ressources publiques doivent d'abord répondre aux besoins intérieurs, et que l'efficacité réelle de l'aide au développement mérite d'être évaluée rigoureusement avant d'en augmenter le volume.","int"],
["L'uniforme scolaire doit être rendu obligatoire dans les établissements publics français.","L'uniforme scolaire est rare en France mais très répandu au Royaume-Uni et dans de nombreux pays. Des expérimentations locales ont eu lieu dans quelques établissements français, sans généralisation nationale.","Ses partisans estiment que l'uniforme réduit les inégalités vestimentaires visibles entre élèves, limite les phénomènes de discrimination ou de pression sociale liés aux marques et aux tenues, et renforce le sentiment d'appartenance à la communauté scolaire.","Ses opposants estiment que l'uniforme limite la liberté d'expression et l'affirmation de l'identité individuelle des jeunes, et que les problèmes liés aux inégalités sociales à l'école appellent des réponses pédagogiques et sociales plutôt que vestimentaires.","edu"],
["Un service civique obligatoire d'un an doit être instauré pour tous les jeunes Français.","Le service militaire obligatoire a été suspendu en France en 1997. Le Service National Universel (SNU) a été lancé en 2019 mais reste optionnel pour la grande majorité des jeunes.","Ses partisans estiment qu'un service civique obligatoire renforcerait la cohésion nationale, transmettrait des valeurs civiques communes à tous les jeunes et permettrait de créer des liens entre des personnes d'origines sociales et géographiques très différentes.","Ses opposants estiment qu'un service obligatoire d'un an représenterait un coût logistique et financier considérable, retarderait l'entrée dans la vie active ou les études, et que des dispositifs volontaires peuvent atteindre des objectifs similaires à moindre coût.","edu"],
["Les normes environnementales imposées aux agriculteurs français doivent être allégées pour rester compétitifs.","Les normes environnementales imposées à l'agriculture française — limitations sur les intrants chimiques, règles de bien-être animal — sont souvent plus strictes que celles applicables aux producteurs de pays tiers dont les produits sont importés en France.","Ses partisans estiment qu'alléger certaines normes environnementales permettrait de rétablir une concurrence plus équitable avec les producteurs étrangers moins contraints, réduisant ainsi les risques de faillites dans les exploitations françaises.","Ses opposants estiment que le maintien de normes élevées est nécessaire pour protéger la santé des consommateurs et les écosystèmes, et que la réponse aux distorsions de concurrence doit passer par l'élévation des normes imposées aux importations plutôt que par l'abaissement des siennes.","agr"],
["Les déserts médicaux doivent être combattus par une obligation d'installation des médecins dans les zones sous-dotées.","Environ 6 millions de Français vivent dans des zones considérées comme des déserts médicaux. Ce phénomène s'est aggravé avec la baisse du numerus clausus sur plusieurs décennies.","Ses partisans estiment qu'obliger les médecins à s'installer dans les zones sous-dotées pendant une période définie est la seule mesure suffisamment efficace et rapide pour résorber les déserts médicaux et garantir l'accès aux soins sur l'ensemble du territoire.","Ses opposants estiment que la liberté d'installation est un principe reconnu par les ordres professionnels de santé, et que des mesures incitatives — primes, allègements fiscaux, aides à l'installation — sont plus respectueuses de ce principe tout en pouvant être efficaces.","soc"],
["Les données personnelles collectées par les entreprises doivent être soumises à un droit à la portabilité et à l'effacement effectif.","Le Règlement Général sur la Protection des Données (RGPD), entré en vigueur en 2018, donne aux citoyens européens des droits sur leurs données personnelles : accès, rectification, effacement et portabilité. Son application effective par les grandes plateformes fait l'objet de critiques régulières.","Ses partisans estiment que renforcer le droit à la portabilité et à l'effacement effectif des données redonne aux citoyens un contrôle réel sur leurs informations personnelles et réduit la dépendance structurelle vis-à-vis des grandes plateformes.","Ses opposants estiment que les droits existants sont déjà étendus, et que leur renforcement risque d'imposer des contraintes techniques et juridiques excessives aux entreprises, y compris aux plus petites structures innovantes.","num"],
["Le droit à l'avortement doit être inscrit dans la Constitution française pour le protéger définitivement.","L'avortement est légal en France depuis la loi Veil (1975). Il a été inscrit dans la Constitution française en mars 2024. En 2022, ce débat portait sur l'opportunité de cette inscription, dans un contexte marqué notamment par la remise en cause du droit à l'avortement aux États-Unis.","Ses partisans estiment qu'inscrire le droit à l'avortement dans la Constitution le protège définitivement de toute remise en cause par une majorité parlementaire future, à l'image de ce qui s'est produit dans d'autres démocraties.","Ses opposants estiment que la loi ordinaire offrait déjà une protection solide et que constitutionnaliser ce droit introduit des rigidités inutiles dans la hiérarchie des normes. Certains avancent également que le droit à la vie, dont la protection relève de convictions éthiques et philosophiques profondes, mérite d'être mis en balance avec cette inscription.","soc2"]
];

function compute(){const cm={};CK.forEach(k=>{let s=0,n=0;aQ.forEach(q=>{const v=ans[q.id];if(v!==undefined&&v!=='skip'){s+=1-Math.abs(v-q.p[k])/4;n++;}});cm[k]=n?Math.round(s/n*100):0;});let xt=0,xn=0,yt=0,yn=0;aQ.forEach(q=>{const v=ans[q.id];if(v===undefined||v==='skip')return;if(q.ax==='x'){xt+=v*q.d;xn++;}if(q.ax==='y'){yt+=v*q.d;yn++;}});return{cm,ux:xn?xt/xn:0,uy:yn?yt/yn:0,sorted:Object.entries(cm).sort((a,b)=>b[1]-a[1])};}
function getElim(){const e={};if(!dbSet.size)return e;dbSet.forEach(qid=>{const q=QQ.find(x=>x.id===qid),uv=ans[qid];if(!q||!uv||uv==='skip')return;CK.forEach(k=>{const cp=q.p[k];if((uv>0&&cp<0)||(uv<0&&cp>0)){if(!e[k])e[k]=[];e[k].push(q.t);}});});return e;}

 * Vote +2 ou −2 → ligne rouge automatique
 * Candidat en position opposée éliminé, même à 90 % de compatibilité
 */</span><br><span class="kw">function</span> <span class="fn">compatibilite</span>(reponses, positions) {<br>  <span class="kw">let</span> score = <span class="nm">0</span>, n = <span class="nm">0</span>;<br>  reponses.<span class="fn">forEach</span>(({id, valeur}) => {<br>    <span class="kw">if</span> (valeur === <span class="nm">'skip'</span>) <span class="kw">return</span>;<br>    score += <span class="nm">1</span> - Math.<span class="fn">abs</span>(valeur - positions[id]) / <span class="nm">4</span>;<br>    n++;<br>  });<br>  <span class="kw">return</span> Math.<span class="fn">round</span>((score / n) * <span class="nm">100</span>);<br>}<br><span class="cm2">// Tout s'exécute dans votre navigateur — aucune donnée transmise</span></div></div>`;}

function sC(){showCode=!showCode;R();}
function gH(){if(tmr){clearTimeout(tmr);tmr=null;}ph='home';showCode=false;R();}
function nav(){return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px"><button class="hb" onclick="gH()">← Menu</button><button class="tb" onclick="tT()">${dk?'☀ Clair':'🌙 Sombre'}</button></div>`;}
function civic(){return`<div class="cv"><div style="font-size:16px;font-weight:700;color:var(--t1);margin-bottom:12px">🗳 Voter est un devoir civique — et un devoir de se renseigner soi-même</div><p class="bm" style="margin-bottom:11px">Dans une démocratie, votre opinion vous appartient. Mais elle se construit — elle ne s'impose pas.</p><p class="bm" style="margin-bottom:11px">Recevoir une information de manière orientée — via un réseau social, un média partial, ou même un proche convaincu — influence votre avis <em>avant même que vous ayez eu le temps de le former vous-même</em>. C'est un phénomène documenté en psychologie : la première version d'un fait que nous entendons colore durablement notre jugement. L'amorçage cognitif et les biais de confirmation font le reste.</p><p class="bm" style="margin-bottom:11px">Ce test présente chaque position de manière équilibrée, sans jugement et sans orientation. Il ne vous dit pas pour qui voter. Il vous aide à <strong>comprendre les programmes</strong> et à identifier vos propres convictions — pour que votre vote soit réellement le vôtre.</p><p class="bm" style="margin-bottom:11px">La République française repose sur des valeurs fondamentales : <strong>Liberté, Égalité, Fraternité</strong>. La démocratie représentative n'a de sens que si chacun participe. <strong>S'abstenir, c'est laisser les autres décider à votre place.</strong> Voter sans se renseigner, c'est déléguer son jugement à ceux qui ont parlé le plus fort.</p><p class="bm">Ce test est un premier pas. Lisez plusieurs sources, confrontez les arguments, questionnez les certitudes. Le travail de citoyen commence avant le bureau de vote.</p></div>`;}

function R(){if(ph==='home')rHome();else if(ph==='themes')rThemes();else if(ph==='quiz')rQuiz();else rRes();}

function rHome(){$().innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div></div><button class="tb" onclick="tT()">${dk?'☀ Clair':'🌙 Sombre'}</button></div><div class="card" style="display:flex;gap:12px;padding:15px;margin-bottom:14px"><span style="font-size:22px">🔒</span><div><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:4px">Anonymat total &amp; indépendance</div><p class="bs">Aucune donnée transmise ni sauvegardée. Tout fonctionne localement dans votre navigateur. Projet <b>indépendant</b> — sans affiliation politique, sans financement partisan. Objectif : vous fournir les éléments pour <em>vous renseigner vous-même</em> et former votre propre jugement, sans influence.</p></div></div><div><div class="lb" style="margin-bottom:10px">Présidentielle française 2022</div><h1 style="font-size:26px;font-weight:700;line-height:1.2;margin-bottom:8px;color:var(--t1);font-family:Georgia,serif">Test de personnalité politique</h1><p class="bm" style="margin-bottom:6px">Comparez vos opinions aux programmes officiels des <b>12 candidats</b>.</p><p class="bs" style="margin-bottom:20px">Objectif : vous aider à découvrir les programmes par vous-même, sans influence.</p><div class="mc" onclick="sMode('quick')"><div class="mi">⚡</div><div><div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)">Test Rapide</div><p class="bs">35 questions essentielles sur 13 thèmes. Environ 10 minutes.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="ct">35 questions</span><span class="ct">~10 min</span><span class="ct">Sources neutres</span></div></div></div><div class="mc" onclick="sMode('deep')"><div class="mi">🔍</div><div><div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)">Test Complet</div><p class="bs">62 questions couvrant la quasi-totalité des programmes. Filtre thématique. Environ 20 minutes.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="ct">62 questions</span><span class="ct">~20 min</span><span class="ct">Filtre thématique</span></div></div></div><div class="mc hi" onclick="sMode('filter')"><div class="mi" style="background:var(--rg)">🎯</div><div><div style="font-size:16px;font-weight:700;margin-bottom:4px;color:var(--t1)">Filtre Décisif</div><p class="bs">62 questions. Répondre "totalement" crée une <b style="color:var(--rt)">ligne rouge automatique</b> : tout candidat en position opposée est éliminé, même à 90 % de compatibilité. Les 62 questions sont nécessaires pour que les résultats soient honnêtes.</p><div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap"><span class="cr2">62 questions</span><span class="cr2">Lignes rouges auto</span><span class="cr2">Paradoxes</span></div></div></div><div style="margin-top:14px;padding-top:14px;border-top:.5px solid var(--cb);display:flex;gap:10px;flex-wrap:wrap"><button class="se" onclick="sC()">${showCode?'▲ Masquer':'⚙ Algorithme de calcul'}</button><a href="https://github.com/" target="_blank" class="se" style="text-decoration:none">↗ Code source</a></div>${showCode?`<div style="margin-top:12px">${codeBlock()}</div>`:''}</div>${civic()}`;}

function sMode(m){mode=m;ans={};dbSet=new Set();detOpen=new Set();showCode=false;if(m==='filter'){aQ=QF;ci=0;ph='quiz';}else if(m==='quick'){aQ=Q35;ci=0;ph='quiz';}else{selTh=new Set(TH);ph='themes';}R();}
function rThemes(){const n=QQ.filter(q=>selTh.has(q.th)).length;$().innerHTML=nav()+`<div><div class="lb" style="margin-bottom:12px">Test Complet · Thèmes</div><p class="bm" style="margin-bottom:14px">Cochez les thèmes qui vous intéressent (tout coché par défaut).</p><div class="card" style="padding:14px 16px">${TH.map((t,i)=>`<label class="cbr" onclick="tTh(${i})"><span class="cbb${selTh.has(t)?' on':''}"></span>${t}</label>`).join('')}<div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:.5px solid var(--cb)"><button class="se" onclick="sAll()">Tout cocher</button><button class="se" onclick="sNone()">Tout décocher</button></div></div><p class="bs" style="margin-bottom:16px">${n} question${n>1?'s':''} sélectionnée${n>1?'s':''}</p><button class="pr" onclick="lQ()" ${n===0?'disabled':''}>Commencer →</button></div>`;}
function tTh(i){const t=TH[i];selTh.has(t)?selTh.delete(t):selTh.add(t);R();}
function sAll(){TH.forEach(t=>selTh.add(t));R();}
function sNone(){selTh.clear();R();}
function lQ(){aQ=QQ.filter(q=>selTh.has(q.th));ci=0;ph='quiz';R();}

function rQuiz(){
  const q=aQ[ci],a=ans[q.id],isFlt=mode==='filter',isLast=ci===aQ.length-1;
  const pct=Math.round(ci/aQ.length*100);
  const sc=v=>{if(a===v)return v===-2?'sn2':v===-1?'sn1':v===0?'s0':v===1?'s1':'s2';return '';};
  const isDet=detOpen.has(q.id);
  const ce=getElim(),ec=Object.keys(ce).length;
  const ebar=isFlt&&ec>0?`<div style="background:var(--rg);border:.5px solid var(--rb);border-radius:10px;padding:10px 13px;margin-bottom:12px;font-size:13px;color:var(--rt);font-weight:500">🔴 ${ec} candidat${ec>1?'s':''} éliminé${ec>1?'s':''} : ${Object.keys(ce).map(k=>CV[k].n.split(' ').slice(-1)[0]).join(', ')}</div>`:'';
  const fhint=isFlt?`<div style="padding:11px 14px;border-radius:10px;background:var(--wg);border:.5px solid var(--wb);font-size:13px;color:var(--wt);margin-bottom:12px;line-height:1.6">🎯 <b>Filtre Décisif</b> — Répondre <b>"Totalement d'accord"</b> ou <b>"Totalement en désaccord"</b> crée une <b style="color:var(--rt)">ligne rouge automatique</b> : tout candidat en position opposée est éliminé, même à 90 % de compatibilité globale.</div>`:'';
  const detBox=isDet?`<div class="dbox"><p style="font-size:12px;font-weight:600;color:var(--t3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em">Contexte</p><p style="font-size:13.5px;color:var(--t2);line-height:1.75;margin-bottom:13px">${q.ctx}</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}<div style="margin-top:12px;padding-top:10px;border-top:.5px solid var(--cb)"><div class="lb" style="margin-bottom:7px">Sources pour approfondir</div><div style="display:flex;flex-wrap:wrap;gap:12px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div></div>`:'';
  const isRL=dbSet.has(q.id);
  const rlb=isRL?`<div style="display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:20px;background:var(--rg);border:.5px solid var(--rb);font-size:13px;color:var(--rt);font-weight:600;margin-top:10px">🔴 Ligne rouge active — candidats opposés éliminés</div>`:'';
  const nxt=isLast&&a!==undefined?`<button class="pr" onclick="finish()">Voir les résultats →</button>`:`<span class="bs">${a!==undefined?'Passage auto dans 0,5 s…':'Sélectionnez une réponse'}</span>`;
  $().innerHTML=nav()+`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span class="bs" style="font-weight:600">${isFlt?'Filtre Décisif':mode==='quick'?'Test Rapide':'Test Complet'} · Q${ci+1}/${aQ.length}</span><span class="bs">${pct}%</span></div><div class="pb" style="margin-bottom:14px"><div class="pf" style="width:${pct}%"></div></div>${ebar}<div class="card">${fhint}<span style="display:inline-block;padding:4px 11px;border-radius:10px;font-size:12px;font-weight:600;background:var(--ch);color:var(--ct);margin-bottom:13px">${q.th}</span><p class="qt" style="margin-bottom:16px">${q.t}</p><button class="db${isDet?' on':''}" onclick="tDet(${q.id})">${isDet?'▲':'ℹ️'}&nbsp; ${isDet?'Masquer le contexte':'Contexte &amp; arguments — lire avant de répondre'}</button>${detBox}<div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:5px;margin-bottom:8px">${LK.map(l=>`<button class="ab ${sc(l.v)}" onclick="pick(${l.v})">${l.l.replace('\n','<br>')}</button>`).join('')}</div><button class="ab sk" style="width:100%;margin-bottom:3px" onclick="pickSk()">❓ Je ne connais pas ce sujet</button>${rlb}</div>${showCode?`<div style="margin-top:10px">${codeBlock()}</div>`:''}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px"><div style="display:flex;gap:8px"><button class="se" onclick="gBack()">← Retour</button><button class="se" style="font-size:12px" onclick="sC()">${showCode?'▲':'⚙'} Code</button></div>${nxt}</div></div>`;}

function tDet(qid){detOpen.has(qid)?detOpen.delete(qid):detOpen.add(qid);R();}
function pick(v){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]=v;if(mode==='filter'&&(v===2||v===-2))dbSet.add(aQ[ci].id);else if(mode==='filter')dbSet.delete(aQ[ci].id);R();if(ci<aQ.length-1)tmr=setTimeout(()=>{ci++;R();},500);}
function pickSk(){if(tmr){clearTimeout(tmr);tmr=null;}ans[aQ[ci].id]='skip';R();if(ci<aQ.length-1)tmr=setTimeout(()=>{ci++;R();},500);}
function gBack(){if(tmr){clearTimeout(tmr);tmr=null;}if(ci>0){ci--;R();}else{ph=mode==='deep'?'themes':'home';R();}}
function finish(){ph='results';R();}

function rRes(){
  const res=compute(),td=tend(res.ux,res.uy),elim=getElim();
  const skipped=aQ.filter(q=>ans[q.id]==='skip');
  const thCount=new Set(aQ.map(q=>q.th)).size;
  const candsH=res.sorted.map(([k,p],i)=>{
    const isE=!!elim[k],isTop=i===0&&!isE,isPx=isE&&p>=65;
    const{ag,di}=getDet(k);const conflicts=elim[k]||[];
    const agH=ag.length?ag.map(t=>`<div class="di"><span class="dot" style="background:var(--gk)"></span><span>${t}</span></div>`).join(''):`<div class="di" style="color:var(--t4)">Aucun accord notable</div>`;
    const diH=di.length?di.map(t=>`<div class="di"><span class="dot" style="background:var(--rt)"></span><span>${t}</span></div>`).join(''):`<div class="di" style="color:var(--t4)">Aucun désaccord notable</div>`;
    const conflH=conflicts.length?`<div style="background:var(--rg);border:.5px solid var(--rb);border-radius:9px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--rt);margin-bottom:7px">🔴 Raison${conflicts.length>1?'s':''} d'élimination</div>${conflicts.map(t=>`<div style="font-size:13px;color:var(--rt);line-height:1.6;padding:5px 0;border-bottom:.5px solid var(--rb)">· ${t}</div>`).join('')}</div>`:'';
    const pxH=isPx?`<div style="background:var(--wg);border:.5px solid var(--wb);border-radius:9px;padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--wt);margin-bottom:8px">⚠ Paradoxe détecté</div><p style="font-size:14px;color:var(--wt);line-height:1.65;margin-bottom:8px"><b>${CV[k].n}</b> est éliminé sur votre ligne rouge, mais affiche <b>${p}% de compatibilité</b> sur l'ensemble des 62 questions.</p><p style="font-size:13px;color:var(--wt);line-height:1.65">Ce score est calculé sur la totalité du programme — il est représentatif. Le désaccord identifié est-il vraiment rédhibitoire au point d'exclure ${p}% d'accord sur tout le reste ?</p></div>`:'';
    return`<div class="cr${isE?' el':''}${isTop?' tp':''}"><div class="ch2" onclick="tCand('${k}')"><div style="display:flex;align-items:center;gap:8px;min-width:0"><span style="width:9px;height:9px;border-radius:50%;background:${CV[k].c};display:inline-block;flex-shrink:0"></span><span style="font-size:15px;font-weight:${isTop?700:500};color:var(--t1);white-space:nowrap">${CV[k].n}</span><span class="bs" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${CV[k].p}</span>${isE?`<span style="font-size:11px;background:var(--rg);color:var(--rt);padding:2px 7px;border-radius:8px;flex-shrink:0;font-weight:700">éliminé</span>`:''}${isPx?`<span style="font-size:11px;background:var(--wg);color:var(--wt);padding:2px 7px;border-radius:8px;flex-shrink:0">⚠ paradoxe</span>`:''}</div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><span style="font-size:16px;font-weight:700;color:${isTop?CV[k].c:'var(--t4)'}">${p}%</span><span id="arr-${k}" style="font-size:11px;color:var(--t4)">▼</span></div></div><div class="bar" style="margin:0 13px 8px"><div class="bf" data-w="${p}" style="background:${CV[k].c};opacity:${isE?.3:isTop?1:.65}"></div></div><div id="det-${k}" class="cd">${conflH}${pxH}<div class="lb" style="margin-bottom:5px">✓ Accords (${ag.length})</div>${agH}<div class="lb" style="margin:10px 0 5px">✗ Désaccords (${di.length})</div>${diH}</div></div>`;
  }).join('');
  const skipSec=skipped.length?`<div style="margin-top:22px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px">❓ Sujets non répondus — sources pour se renseigner</div><p class="bs" style="margin-bottom:12px">Vous avez indiqué ne pas connaître ${skipped.length} sujet${skipped.length>1?'s':''} ci-dessous.</p>${skipped.map(q=>`<div style="background:var(--ig);border:.5px solid var(--it);border-radius:10px;padding:13px;margin-bottom:9px"><div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px">${q.th} — ${q.t}</div><p style="font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px">${q.ctx}</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:10px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div>`).join('')}</div>`:'';
  const srcMap={};aQ.forEach(q=>{if(!srcMap[q.th])srcMap[q.th]={th:q.th,src:q.src};});
  const srcH=Object.values(srcMap).map(({th,src})=>`<div style="margin-bottom:11px"><p class="bs" style="font-weight:600;margin-bottom:5px">${th}</p>${src.map(s=>`<a class="sa" href="${s.u}" target="_blank" style="margin-right:14px">→ ${s.l}</a>`).join('')}</div>`).join('');
  $().innerHTML=nav()+`<div><div class="lb" style="margin-bottom:12px">Résultats · ${mode==='quick'?'Test Rapide':mode==='deep'?'Test Complet':'Filtre Décisif'}</div><div class="sc"><div class="lb" style="margin-bottom:6px">Votre tendance politique</div><div style="font-size:24px;font-weight:700;margin-bottom:9px;color:var(--t1);font-family:Georgia,serif">${td.l}</div><p class="bm">${td.d}</p>${skipped.length?`<p class="bs" style="margin-top:7px">${skipped.length} sujet${skipped.length>1?'s':''} passé${skipped.length>1?'s':''} — exclus du calcul</p>`:''}</div><div class="card" style="padding:15px;margin-bottom:15px"><div style="font-size:15px;font-weight:700;margin-bottom:10px;color:var(--t1)">Boussole politique</div>${compass(res.ux,res.uy)}<div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;margin-top:10px">${CK.map(k=>`<div style="display:flex;align-items:center;gap:5px;overflow:hidden"><span style="width:7px;height:7px;border-radius:50%;background:${CV[k].c};flex-shrink:0;display:inline-block"></span><span class="bs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${CV[k].n.split(' ').slice(-1)[0]}</span></div>`).join('')}</div></div><div style="font-size:15px;font-weight:700;margin-bottom:6px;color:var(--t1)">Compatibilité par candidat</div><p class="bs" style="margin-bottom:10px">Cliquez pour voir accords, désaccords, lignes rouges et paradoxes.</p>${candsH}${skipSec}<div class="card" style="margin-top:16px;padding:15px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:12px">📚 Sources par thème</div>${srcH}</div><div style="margin-top:14px;padding:13px;background:var(--c2);border-radius:11px"><p class="bs" style="line-height:1.7"><b style="color:var(--t2)">Méthodologie</b> — ${aQ.length} questions / ${thCount} thèmes. Compatibilité = 1 − |vote − position_candidat| / 4. Ligne rouge (Filtre Décisif) : élimine si signe opposé à un vote "totalement". Positions estimées sur programmes officiels 2022. Projet indépendant, aucune orientation d'opinion.</p></div><div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap"><button class="se" onclick="sC()">${showCode?'▲ Masquer':'⚙ Algorithme'}</button><a href="https://github.com/" target="_blank" class="se" style="text-decoration:none">↗ Code source</a><button class="se" onclick="gH()">↩ Recommencer</button></div>${showCode?`<div style="margin-top:14px">${codeBlock()}</div>`:''}</div>${civic()}`;
  setTimeout(()=>{document.querySelectorAll('.bf').forEach(e=>{e.style.width=e.dataset.w+'%';});},100);}

function tCand(k){const e=document.getElementById('det-'+k),a=document.getElementById('arr-'+k);if(e){e.classList.toggle('op');if(a)a.textContent=e.classList.contains('op')?'▲':'▼';}}
R();
</script>
