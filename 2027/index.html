// QD: [question, contexte, pour, contre, srcKey]
const QD=[
["L'État doit augmenter les dépenses publiques pour améliorer les services publics, quitte à creuser davantage la dette.","La dette française dépasse 110 % du PIB (~3 000 Mds€). Les dépenses publiques financent santé, éducation, transports et sécurité.","Ses partisans estiment que l'investissement public améliore le niveau de vie, réduit les inégalités et soutient la croissance économique à long terme.","Ses opposants estiment que la maîtrise de la dette protège les générations futures, préserve la crédibilité financière de la France et laisse des marges de manœuvre en cas de crise.","eco"],
["L'âge légal de départ à la retraite doit être abaissé à 60 ans pour les carrières longues.","L'âge légal de retraite a été porté à 64 ans en 2023. Pénibilité, espérance de vie en bonne santé et financement du système sont au cœur du débat.","Ses partisans estiment qu'un départ plus précoce est une juste reconnaissance de la pénibilité de certains métiers et permet aux travailleurs de profiter de leur retraite en bonne santé.","Ses opposants estiment que l'allongement progressif de la durée de cotisation est nécessaire pour assurer la viabilité financière du système et son équité entre générations.","eco"],
["Le Salaire Minimum Interprofessionnel de Croissance (SMIC) doit être augmenté significativement.","Le SMIC est régulièrement revalorisé. Le débat porte sur le rythme et l'ampleur des hausses souhaitables au regard du pouvoir d'achat et de l'emploi.","Ses partisans estiment qu'une hausse significative améliore le pouvoir d'achat des ménages les plus modestes et contribue à réduire les inégalités salariales.","Ses opposants estiment qu'une hausse trop rapide peut fragiliser les secteurs à faibles marges et les très petites entreprises, avec un risque de réduction des embauches.","eco"],
["Un Impôt sur la Fortune (ISF) doit être rétabli pour les très hauts patrimoines.","L'Impôt de Solidarité sur la Fortune (ISF) a été supprimé en 2018 et remplacé par l'Impôt sur la Fortune Immobilière (IFI), limité à l'immobilier.","Ses partisans estiment que rétablir un impôt sur l'ensemble du patrimoine est un instrument de justice fiscale permettant une meilleure redistribution des richesses.","Ses opposants estiment que la suppression de cet impôt a favorisé le maintien des capitaux en France et encourage l'investissement dans les entreprises et l'économie productive.","eco"],
["Il faut réduire les prélèvements obligatoires pesant sur les entreprises pour favoriser la compétitivité.","Les prélèvements obligatoires sur les entreprises comprennent les cotisations sociales patronales, diverses taxes et impôts. Leur niveau global est parmi les plus élevés d'Europe.","Ses partisans estiment que réduire ces prélèvements améliore la compétitivité des entreprises françaises, allège le coût du travail et favorise les créations d'emplois.","Ses opposants estiment que le niveau actuel de ces prélèvements garantit le financement du modèle de protection sociale et de services publics dont bénéficient l'ensemble des salariés et des citoyens.","eco"],
["La France doit protéger ses industries stratégiques de la concurrence internationale.","La désindustrialisation française est un sujet récurrent. Le débat porte sur le rôle de l'État dans la stratégie économique nationale face à la concurrence mondiale.","Ses partisans estiment que protéger les secteurs stratégiques préserve l'emploi national, assure une souveraineté économique et évite une dépendance excessive à l'égard de fournisseurs étrangers.","Ses opposants estiment que l'ouverture à la concurrence internationale stimule l'innovation, maintient les prix à la consommation à un niveau raisonnable et renforce la compétitivité globale.","eco"],
["L'État est trop présent dans la vie économique et doit laisser davantage de place à l'initiative privée.","La France consacre environ 57 % de son PIB aux dépenses publiques, l'un des taux les plus élevés au monde.","Ses partisans estiment que réduire le poids de l'État libère l'initiative individuelle, stimule l'entrepreneuriat et améliore l'efficacité économique globale.","Ses opposants estiment que l'intervention de l'État garantit l'accès universel aux services essentiels, réduit les inégalités et assure une protection collective contre les aléas du marché.","eco"],
["Les flux migratoires vers la France doivent être fortement réduits.","La France délivre environ 270 000 titres de séjour par an. L'immigration est un phénomène multiforme : travail, regroupement familial, études, protection internationale.","Ses partisans estiment qu'une politique migratoire plus sélective et mieux contrôlée permet d'assurer une intégration de meilleure qualité et d'adapter les flux aux capacités d'accueil du pays.","Ses opposants estiment que l'immigration contribue à l'économie française, compense les déficits démographiques dans certains secteurs, et que la France a des engagements humanitaires qui encadrent la gestion des flux.","imm"],
["Le droit du sol doit être supprimé ou fortement restreint.","Le droit du sol permet d'obtenir la nationalité française en étant né sur le territoire français de parents étrangers. Il coexiste avec le droit du sang depuis la fin du XIXe siècle.","Ses partisans estiment que restreindre le droit du sol permet de mieux conditionner l'attribution de la nationalité à une démarche d'intégration effective et volontaire.","Ses opposants estiment que le droit du sol, inscrit dans la tradition républicaine depuis plus d'un siècle, favorise l'intégration des enfants nés sur le sol national.","imm"],
["L'intégration des personnes immigrées nécessite davantage de moyens publics.","Le taux d'emploi des personnes immigrées est inférieur d'environ 10 points à la moyenne nationale. L'intégration touche le logement, l'emploi, la langue et l'éducation.","Ses partisans estiment qu'investir dans l'intégration — formation linguistique, accès à l'emploi, accompagnement social — est efficace pour la cohésion nationale et bénéfique économiquement.","Ses opposants estiment que conditionner l'accueil à des critères préalables permet de mieux cibler les ressources disponibles et d'assurer une insertion plus durable.","imm"],
["Les peines de prison doivent être significativement alourdies pour les crimes graves.","La France connaît une surpopulation carcérale chronique. Le taux de récidive est estimé à environ 40 % dans les cinq ans suivant la libération.","Ses partisans estiment que des peines plus sévères ont un effet dissuasif sur les crimes graves et répondent à l'attente de protection de la société et de justice pour les victimes.","Ses opposants estiment que renforcer les dispositifs de réinsertion est la voie la plus efficace pour réduire durablement la récidive.","sec"],
["La France doit recruter davantage de forces de l'ordre.","La France compte environ 150 000 policiers et gendarmes. Le débat porte sur les moyens à allouer à la sécurité publique.","Ses partisans estiment que davantage de forces de l'ordre améliore la présence sur le terrain et permet une réponse plus rapide aux infractions.","Ses opposants estiment qu'une approche sociale et préventive est plus efficace pour réduire la délinquance à long terme.","sec"],
["La légalisation du cannabis à usage récréatif doit être envisagée.","Le cannabis est consommé par environ 5 millions de Français. La légalisation à des fins récréatives existe dans plusieurs pays.","Ses partisans estiment que la légalisation encadrée permet de contrôler la qualité, réduire les trafics criminels et traiter la consommation comme un enjeu de santé publique.","Ses opposants estiment que maintenir l'interdiction envoie un signal clair sur les risques sanitaires, notamment pour les jeunes, et évite de normaliser l'usage d'une substance psychoactive.","sec"],
["La France doit récupérer des compétences souveraines vis-à-vis de l'Union européenne.","Depuis le traité de Maastricht (1992), la France a transféré à l'UE des compétences importantes : politique monétaire, commerciale, règles budgétaires.","Ses partisans estiment que récupérer certaines compétences permettrait à la France de mener des politiques plus adaptées à ses besoins et de restaurer un contrôle démocratique direct.","Ses opposants estiment que ces transferts permettent à la France de peser davantage dans les négociations mondiales et de bénéficier d'un espace économique intégré plus efficace.","eu"],
["L'Union européenne est globalement bénéfique pour la France.","La France est un des principaux bénéficiaires des fonds structurels européens. L'UE représente environ 60 % du commerce extérieur français.","Ses partisans estiment que l'Union européenne garantit la paix sur le continent, crée des solidarités économiques, protège les droits des citoyens et renforce le poids de la France dans le monde.","Ses opposants estiment que certaines règles européennes limitent la capacité des États membres à mener des politiques souveraines adaptées à leur situation propre.","eu"],
["La transition écologique doit être une priorité absolue, même si elle implique des efforts économiques importants.","Le GIEC préconise des réductions d'émissions ambitieuses. La France s'est engagée à la neutralité carbone en 2050. Le coût de la transition est estimé à plusieurs dizaines de milliards par an.","Ses partisans estiment que faire de la transition écologique une priorité absolue est la seule voie pour éviter des catastrophes climatiques dont le coût serait bien supérieur aux investissements nécessaires.","Ses opposants estiment qu'une transition dont le rythme n'est pas adapté aux capacités économiques risque de peser disproportionnellement sur les ménages modestes.","ecol"],
["L'énergie nucléaire doit rester une composante importante du mix énergétique français.","La France produit environ 70 % de son électricité par fission nucléaire. De nouvelles centrales (EPR2) sont en projet. Le débat porte sur la place du nucléaire dans la transition énergétique.","Ses partisans estiment que l'énergie nucléaire garantit une électricité peu carbonée, une indépendance énergétique durable et des prix stables.","Ses opposants estiment qu'il faut accélérer la transition vers les énergies renouvelables, en raison des risques, des défis liés aux déchets radioactifs et du coût du démantèlement.","ecol"],
["Les activités très polluantes doivent être beaucoup plus fortement taxées.","La taxe carbone vise à intégrer le coût environnemental dans le prix des activités polluantes. Le débat sur la répartition des efforts entre catégories sociales reste vif.","Ses partisans estiment que taxer plus fortement les activités polluantes incite les entreprises et les ménages à modifier leurs comportements et à investir dans des alternatives moins émettrices.","Ses opposants estiment que cette forme de taxation peut pénaliser des ménages qui n'ont pas encore accès à des alternatives abordables.","ecol"],
["Le système de santé doit rester entièrement public, sans aucune privatisation.","La Sécurité Sociale couvre environ 75 % des dépenses de santé. La France fait face à des déserts médicaux croissants et à des tensions financières structurelles.","Ses partisans estiment que maintenir un système entièrement public garantit l'égalité d'accès aux soins pour tous les citoyens et préserve le principe de solidarité nationale.","Ses opposants estiment qu'une part de gestion privée peut améliorer l'efficacité organisationnelle, réduire les délais d'attente et moderniser l'offre de soins.","soc"],
["Les aides sociales (Revenu de Solidarité Active, allocations) doivent être conditionnées à une démarche active de retour à l'emploi.","Le Revenu de Solidarité Active (RSA) concerne des millions de personnes. La question porte sur les conditions d'attribution des aides sociales.","Ses partisans estiment que conditionner les aides à une démarche d'insertion active favorise le retour vers l'emploi et accompagne les bénéficiaires dans un parcours de réinsertion.","Ses opposants estiment que les aides sociales doivent soutenir inconditionnellement les personnes en difficulté, dont les obstacles au retour à l'emploi sont souvent structurels.","soc"],
["L'État doit construire massivement des logements sociaux pour répondre à la crise du logement.","Des millions de ménages sont en attente d'un logement social en France. La crise du logement s'est accentuée dans les grandes métropoles.","Ses partisans estiment que construire massivement des logements sociaux est le moyen le plus direct pour l'État d'assurer un accès au logement digne pour les ménages les plus modestes.","Ses opposants estiment que simplifier les règles d'urbanisme et libérer le marché immobilier permettrait d'augmenter l'offre globale et de faire baisser les prix.","soc"],
["Les signes religieux ostensibles doivent être davantage limités dans l'espace public.","La loi de 1905 pose le principe de séparation de l'Église et de l'État. Elle interdit les signes religieux dans la fonction publique. La laïcité est un principe à valeur constitutionnelle.","Ses partisans estiment que limiter davantage les signes religieux dans l'espace public renforce la neutralité commune et permet à chaque citoyen d'interagir dans un cadre partagé.","Ses opposants estiment que les règles actuelles offrent un équilibre satisfaisant et que les étendre davantage porterait atteinte à la liberté de conscience et d'expression religieuse.","soc2"],
["Le droit au mariage doit être ouvert à tous les couples, quelle que soit leur orientation sexuelle.","Le mariage pour tous est légal en France depuis 2013. Ce débat porte sur la consolidation et l'extension éventuelle de ces droits.","Ses partisans estiment que l'égalité des droits doit s'appliquer à tous les couples sans distinction, et que le droit au mariage est un droit fondamental.","Ses opposants estiment que le mariage correspond à une institution fondée sur la complémentarité des sexes et que d'autres formes de reconnaissance juridique pourraient répondre aux besoins des couples de même sexe.","soc2"],
["Les traditions culturelles établies méritent d'être préservées face aux changements sociaux rapides.","Les sociétés contemporaines connaissent des transformations rapides : modes de vie, structures familiales, repères culturels. Ce rythme de changement fait lui-même l'objet d'un débat.","Ses partisans estiment que préserver les traditions culturelles assure la continuité sociale, protège les identités collectives et maintient un cadre de sens partagé entre les générations.","Ses opposants estiment que les évolutions sociales reflètent une adaptation naturelle des valeurs et que la société doit pouvoir se transformer pour mieux répondre aux besoins de ses membres.","val"],
["Le recours au référendum doit être généralisé pour les grandes décisions politiques nationales.","Le référendum est prévu par l'article 11 de la Constitution. Il a été utilisé neuf fois sous la Ve République.","Ses partisans estiment que le recours plus fréquent au référendum renforce la démocratie directe et redonne du sens à la participation politique des citoyens.","Ses opposants estiment que les décisions complexes requièrent un débat approfondi confié à des représentants élus, et qu'une consultation directe peut conduire à des réponses qui ne reflètent pas la complexité des enjeux.","dem"],
["Les institutions de la Ve République doivent être profondément réformées ou remplacées par une 6e République.","La Ve République, fondée en 1958, est un régime semi-présidentiel. Le débat sur une possible réforme institutionnelle est récurrent dans la vie politique française.","Ses partisans estiment qu'une réforme profonde des institutions, vers un régime plus parlementaire, renforcerait la légitimité démocratique des décisions collectives.","Ses opposants estiment que la Ve République assure une stabilité gouvernementale nécessaire et évite les crises institutionnelles.","dem"],
["La liberté individuelle doit primer sur les politiques collectives d'égalisation des conditions de vie.","Le débat entre liberté individuelle et égalité des conditions traverse toute la philosophie politique. Ces deux valeurs sont inscrites dans la tradition républicaine française.","Ses partisans estiment que la liberté individuelle est le moteur de la prospérité collective : laisser chacun faire ses choix produit les meilleurs résultats pour la société dans son ensemble.","Ses opposants estiment que des politiques actives de redistribution sont nécessaires pour que la liberté formelle soit réelle pour tous.","val"],
["Les inégalités économiques constituent le problème le plus urgent à résoudre en France.","Les inégalités de patrimoine en France sont nettement plus marquées que les inégalités de revenus. Le débat porte sur l'urgence à leur accorder et les moyens de les réduire.","Ses partisans estiment que réduire les inégalités économiques est urgent pour des raisons de cohésion sociale, d'égalité des chances et de fonctionnement démocratique.","Ses opposants estiment que d'autres priorités — emploi, compétitivité, sécurité — méritent une attention au moins égale.","val"],
["Un changement social profond est nécessaire et urgent en France.","Les transformations sociales sont permanentes mais leur rythme et leur ampleur sont débattus. La question porte sur l'équilibre souhaitable entre stabilité et changement.","Ses partisans estiment qu'un changement social profond et rapide est nécessaire pour répondre aux urgences — inégalités, crise écologique, déficit démocratique.","Ses opposants estiment que les réformes progressives et négociées permettent une adaptation maîtrisée de la société et évitent les ruptures dont les effets sont souvent imprévisibles.","val"],
["La France doit augmenter significativement son budget de défense nationale.","La France consacre environ 2 % de son PIB à la défense. Le contexte géopolitique européen a relancé les débats sur les capacités militaires.","Ses partisans estiment qu'augmenter le budget de la défense est nécessaire pour assurer la souveraineté nationale, honorer les engagements envers les alliés et adapter les capacités militaires.","Ses opposants estiment que les ressources publiques limitées devraient être prioritairement orientées vers les besoins sociaux, la transition écologique et la diplomatie.","int"],
["La mondialisation économique a plutôt été néfaste pour les travailleurs français.","La mondialisation économique a transformé les échanges depuis les années 1990. La France a connu une désindustrialisation significative, mais aussi le développement de nouveaux secteurs exportateurs.","Ses partisans estiment que la mondialisation a contribué aux délocalisations, à la perte d'emplois industriels et a affaibli le pouvoir de négociation des travailleurs.","Ses opposants estiment que l'ouverture économique mondiale a profité aux consommateurs via des prix plus bas et a créé des débouchés à l'export pour les entreprises compétitives.","int"],
["L'enseignement privé doit recevoir moins de financement public que l'enseignement public.","L'enseignement privé sous contrat accueille environ 17 % des élèves français et bénéficie de financements publics en contrepartie du respect des programmes nationaux.","Ses partisans estiment que réduire ces financements permettrait de concentrer les ressources sur l'école publique et de renforcer son rôle d'égalisation des chances.","Ses opposants estiment que la liberté de l'enseignement est un principe reconnu et que financer l'enseignement privé sous contrat est une contrepartie légitime.","edu"],
["L'école doit davantage valoriser la discipline, l'effort et l'autorité des enseignants.","Les débats pédagogiques portent sur la manière d'enseigner, les méthodes et les finalités de l'école. Ces questions traversent le monde de l'éducation depuis des décennies.","Ses partisans estiment que valoriser davantage la discipline et l'autorité de l'enseignant permet de mieux transmettre les savoirs fondamentaux et d'établir un cadre structurant.","Ses opposants estiment que les approches fondées sur l'épanouissement personnel et l'autonomie permettent aux élèves de développer leur esprit critique et de mieux s'adapter.","edu"],
["Les agriculteurs français doivent être davantage protégés et soutenus financièrement par l'État.","Le revenu agricole moyen est d'environ 20 000 € par an, avec de très fortes disparités. Nombreux exploitants peinent à dégager un revenu suffisant.","Ses partisans estiment que soutenir les agriculteurs est nécessaire pour assurer la souveraineté alimentaire et maintenir un tissu rural vivant.","Ses opposants estiment que des réformes structurelles permettraient aux agriculteurs de dégager des revenus plus durables sans dépendance accrue aux subventions.","agr"],
["Les grandes plateformes numériques (Google, Amazon, Meta…) doivent être beaucoup plus strictement régulées.","Les grandes plateformes numériques concentrent des parts de marché considérables. Des questions se posent sur leur impact fiscal, la protection des données et les effets sur la concurrence.","Ses partisans estiment qu'une régulation beaucoup plus stricte est nécessaire pour protéger les données personnelles, combattre les monopoles et assurer une fiscalité équitable.","Ses opposants estiment qu'une régulation excessive risque de freiner l'innovation et qu'des cadres réglementaires existent déjà et méritent d'être mieux appliqués.","num"],
["La flat tax (Prélèvement Forfaitaire Unique) sur les revenus du capital doit être supprimée au profit d'une imposition progressive.","La flat tax (PFU à 30 %) sur les revenus du capital a été instaurée en 2018, remplaçant une imposition au barème progressif de l'impôt sur le revenu.","Ses partisans estiment que revenir à une imposition progressive des revenus du capital rétablit l'équité fiscale en traitant les revenus du capital et ceux du travail selon les mêmes principes.","Ses opposants estiment que le PFU a simplifié la fiscalité de l'épargne, encouragé l'investissement et stabilisé des capitaux en France.","eco"],
["Un revenu universel de base doit être instauré pour tous les citoyens adultes.","Des expériences de revenu universel ont été conduites dans plusieurs pays. En France, le coût d'une telle mesure serait estimé entre 400 et 600 milliards d'euros par an.","Ses partisans estiment qu'un revenu universel de base garantirait à chacun un filet de sécurité, simplifierait les aides sociales et permettrait à chacun de se former ou de créer.","Ses opposants estiment qu'à ce niveau de coût, le financement d'un revenu universel imposerait une fiscalité très lourde, et que ses effets restent à démontrer à grande échelle.","eco"],
["La semaine de travail doit être réduite à 32 heures sans perte de salaire.","La durée légale du travail est de 35 heures depuis 2000. Le débat sur une nouvelle réduction du temps de travail revient régulièrement.","Ses partisans estiment que passer à 32 heures améliorerait la qualité de vie des travailleurs et permettrait de mieux partager le travail disponible.","Ses opposants estiment qu'une réduction du temps de travail sans perte de salaire représente un coût important pour les entreprises et risque de nuire à la compétitivité.","eco"],
["Les industries énergétiques et les transports doivent être renationalisés.","EDF a été renationalisé à 100 % en 2022. La question porte sur le modèle de gestion des industries de réseau.","Ses partisans estiment que la nationalisation garantit un service universel, maintient des tarifs accessibles et place l'intérêt général au-dessus de la rentabilité financière.","Ses opposants estiment que la gestion privée ou mixte favorise l'efficacité, l'investissement et l'innovation.","eco"],
["Les personnes sans-papiers résidant depuis plus de 5 ans en France doivent pouvoir être régularisées.","Selon des estimations, plusieurs centaines de milliers de personnes seraient en situation irrégulière en France, certaines depuis de nombreuses années.","Ses partisans estiment que régulariser les personnes établies depuis longtemps reconnaît leur réalité sociale, met fin à leur précarité juridique et à leur exposition à l'exploitation.","Ses opposants estiment que la régularisation doit rester exceptionnelle et qu'elle pourrait encourager davantage d'immigration irrégulière.","imm"],
["La politique d'asile doit être durcie avec des délais d'instruction raccourcis.","La France instruit un grand nombre de demandes d'asile chaque année. Les délais d'instruction peuvent être longs, générant une grande incertitude pour les demandeurs.","Ses partisans estiment que raccourcir les délais permet de statuer plus rapidement et de favoriser une intégration plus rapide des personnes dont la demande est acceptée.","Ses opposants estiment que des délais suffisants sont nécessaires pour un examen rigoureux et équitable, et qu'une accélération excessive risque de conduire à des décisions injustes.","imm"],
["Des peines minimales obligatoires doivent être rétablies pour les délits en récidive.","Les peines minimales obligatoires ont existé en France entre 2007 et 2014. Le taux de récidive reste significatif malgré diverses réformes.","Ses partisans estiment que rétablir des peines minimales garantit une réponse pénale prévisible et ferme face à la récidive.","Ses opposants estiment que les peines minimales restreignent le pouvoir d'appréciation des magistrats, les mieux placés pour adapter la sanction à chaque situation individuelle.","sec"],
["La France devrait sortir de la zone euro ou en renégocier fondamentalement les règles.","L'euro a été introduit en 1999. La Banque centrale européenne fixe la politique monétaire pour les vingt États membres de la zone euro.","Ses partisans estiment que sortir de la zone euro ou en renégocier les règles permettrait à la France de retrouver des outils de politique économique adaptés à sa situation nationale.","Ses opposants estiment que l'euro garantit la stabilité monétaire, protège contre les spéculations sur la dette et facilite les échanges avec nos partenaires.","eu"],
["Les pesticides de synthèse doivent être interdits dans l'agriculture française d'ici 2030.","La France est un des principaux consommateurs européens de pesticides de synthèse. Des études documentent leurs effets sur la biodiversité et la santé humaine.","Ses partisans estiment que l'interdiction est nécessaire pour préserver les écosystèmes, protéger la santé et engager l'agriculture dans une trajectoire durable.","Ses opposants estiment qu'une échéance aussi proche ne laisse pas assez de temps pour que des alternatives efficaces et économiquement viables soient disponibles pour tous les territoires.","ecol"],
["La vente de véhicules thermiques neufs doit être interdite avant 2035.","L'Union européenne a acté l'interdiction de la vente de véhicules thermiques neufs à partir de 2035. L'industrie automobile française est un secteur majeur d'emplois.","Ses partisans estiment qu'anticiper cette interdiction accélère la transition vers les véhicules électriques et place l'industrie française en position compétitive sur les marchés d'avenir.","Ses opposants estiment qu'une interdiction avant 2035 menace des emplois dans la filière automobile et que le calendrier doit être adapté à la capacité réelle de l'industrie.","ecol"],
["La chasse doit être plus strictement réglementée pour mieux protéger la biodiversité.","La chasse est pratiquée par plus d'un million de personnes en France. Des tensions existent entre chasseurs, défenseurs de l'environnement et autres usagers de la nature.","Ses partisans estiment qu'une réglementation plus stricte est nécessaire pour mieux protéger la biodiversité et améliorer la coexistence avec les autres usagers de la nature.","Ses opposants estiment que la chasse est une pratique culturelle et traditionnelle ancrée dans les territoires ruraux, contribuant à la régulation de certaines espèces.","ecol"],
["L'euthanasie active doit être légalisée en France pour les malades en fin de vie.","L'euthanasie active est légale dans plusieurs pays européens. En France, la loi autorise la sédation profonde mais pas l'injection létale à la demande du patient.","Ses partisans estiment que légaliser l'euthanasie active respecte l'autonomie de la personne et lui permet de choisir les conditions de sa mort dans la dignité.","Ses opposants estiment que la vie humaine mérite d'être protégée jusqu'à son terme naturel et que la légalisation pourrait exposer des personnes vulnérables à des pressions.","soc2"],
["La prise en charge de la dépendance des personnes âgées doit être intégralement couverte par la Sécurité Sociale.","Le vieillissement de la population pose un défi croissant. Le reste à charge en établissement médicalisé est souvent supérieur aux pensions de retraite.","Ses partisans estiment que la prise en charge universelle par la Sécurité Sociale garantit que toute personne puisse être accompagnée dignement dans la dépendance.","Ses opposants estiment qu'une couverture intégrale représenterait un coût considérable et qu'une combinaison d'aide publique ciblée et d'assurance privée serait plus soutenable.","soc"],
["L'encadrement des loyers doit être généralisé dans toutes les grandes villes françaises.","L'encadrement des loyers est en vigueur dans certaines grandes villes. Le marché locatif reste tendu dans de nombreuses métropoles.","Ses partisans estiment que l'encadrement des loyers protège les locataires contre des hausses excessives et permet à des ménages modestes de se maintenir dans les centres urbains.","Ses opposants estiment que plafonner les loyers peut décourager les propriétaires de louer ou d'investir, réduisant ainsi l'offre locative disponible.","soc"],
["La Procréation Médicalement Assistée (PMA) doit être ouverte à toutes les femmes, y compris les femmes célibataires.","La PMA pour toutes les femmes a été légalisée en France en 2021. Ce débat porte sur d'éventuelles extensions ou restrictions.","Ses partisans estiment que l'extension de la PMA à toutes les femmes est une question d'égalité des droits : le désir d'enfant ne devrait pas dépendre de l'orientation sexuelle ou de la situation familiale.","Ses opposants estiment que cette extension soulève des questions sur les droits de l'enfant à connaître ses origines et sur les limites souhaitables à la médicalisation de la reproduction.","soc2"],
["La Gestation Pour Autrui (GPA) doit rester totalement interdite en France.","La Gestation Pour Autrui (GPA) est interdite en France mais pratiquée légalement dans plusieurs pays. Des enfants nés par GPA à l'étranger de parents français voient leur filiation reconnue en France.","Ses partisans estiment que la GPA porte atteinte à la dignité de la femme en faisant de la grossesse l'objet d'un contrat et risque d'ouvrir la voie à des formes de marchandisation du corps humain.","Ses opposants estiment qu'une GPA encadrée, éthique et non commerciale pourrait répondre à des désirs de parentalité légitimes dans un cadre juridique protecteur.","soc2"],
["La représentation proportionnelle doit être introduite aux élections législatives.","La représentation proportionnelle attribue les sièges en proportion des votes. Le système actuel (uninominal à deux tours) favorise les partis capables de rassembler une majorité.","Ses partisans estiment que la proportionnelle garantit une représentation plus fidèle de la diversité des opinions et réduit le phénomène de vote utile.","Ses opposants estiment que la proportionnelle intégrale conduit souvent à des assemblées fragmentées et complique la formation de majorités stables.","dem"],
["Le nombre de mandats successifs des élus doit être limité dans le temps.","Le non-cumul des mandats dans le temps vise à éviter qu'un élu occupe le même poste pendant des décennies.","Ses partisans estiment que limiter les mandats successifs favorise le renouvellement des élus, ouvre la politique à de nouveaux profils et contribue à prévenir les risques de clientélisme.","Ses opposants estiment que l'expérience acquise par un élu dans la durée est un atout pour l'efficacité de son action, et que les électeurs sont souverains pour en décider.","dem"],
["La discrimination positive par quotas est un outil légitime pour corriger les inégalités structurelles.","En France, le principe d'égalité formelle devant la loi interdit les distinctions fondées sur l'origine, ce qui s'oppose traditionnellement à une approche par quotas.","Ses partisans estiment que la discrimination positive est un outil pragmatique pour corriger des inégalités réelles que l'égalité formelle seule ne suffit pas à combler.","Ses opposants estiment que le principe républicain d'universalité est le fondement d'une société juste et qu'une approche catégorielle risque de renforcer des logiques d'appartenance.","val"],
["La France doit rester dans le commandement intégré de l'Organisation du Traité de l'Atlantique Nord (OTAN).","La France a réintégré le commandement militaire intégré de l'OTAN en 2009. Le contexte géopolitique européen a renforcé les débats sur les alliances de défense.","Ses partisans estiment que rester dans le commandement intégré de l'OTAN renforce la sécurité collective et contribue à la dissuasion face aux menaces extérieures.","Ses opposants estiment que la France devrait retrouver une doctrine de défense pleinement autonome, lui permettant de définir ses priorités stratégiques de manière indépendante.","int"],
["L'aide publique au développement doit être portée à 0,7 % du Revenu National Brut (RNB), conformément à l'objectif de l'ONU.","La France consacre moins de 0,7 % de son RNB à l'aide au développement, en dessous de l'objectif fixé par l'ONU.","Ses partisans estiment que porter l'aide à 0,7 % du RNB est une expression de la solidarité internationale et participe à la prévention des crises migratoires, sanitaires ou sécuritaires.","Ses opposants estiment que les ressources publiques doivent d'abord répondre aux besoins intérieurs et que l'efficacité de l'aide mérite d'être évaluée avant d'en augmenter le volume.","int"],
["L'uniforme scolaire doit être rendu obligatoire dans les établissements publics français.","L'uniforme scolaire est rare en France mais répandu dans d'autres pays. Des expérimentations ont eu lieu dans quelques établissements français.","Ses partisans estiment que l'uniforme réduit les inégalités vestimentaires entre élèves et renforce le sentiment d'appartenance à la communauté scolaire.","Ses opposants estiment que l'uniforme limite la liberté d'expression des jeunes et que les inégalités à l'école appellent des réponses pédagogiques plutôt que vestimentaires.","edu"],
["Un service civique obligatoire d'un an doit être instauré pour tous les jeunes Français.","Le Service National Universel (SNU) existe mais reste optionnel pour la grande majorité des jeunes. Le service militaire obligatoire a été suspendu en 1997.","Ses partisans estiment qu'un service civique obligatoire renforcerait la cohésion nationale et transmettrait des valeurs civiques communes à tous les jeunes.","Ses opposants estiment qu'un service d'un an obligatoire représenterait un coût considérable, retarderait l'entrée dans la vie active et que des dispositifs volontaires peuvent atteindre des objectifs similaires.","edu"],
["Les normes environnementales imposées aux agriculteurs français doivent être allégées pour rester compétitifs.","Les normes environnementales françaises sont souvent plus strictes que celles applicables aux producteurs de pays tiers dont les produits sont importés en France.","Ses partisans estiment qu'alléger certaines normes permettrait de rétablir une concurrence plus équitable avec les producteurs étrangers moins contraints.","Ses opposants estiment que le maintien de normes élevées protège la santé des consommateurs et les écosystèmes, et que la réponse est d'élever les normes imposées aux importations.","agr"],
["Les déserts médicaux doivent être combattus par une obligation d'installation des médecins dans les zones sous-dotées.","Des millions de Français vivent dans des zones considérées comme des déserts médicaux. Ce phénomène s'est aggravé avec la baisse du nombre de médecins formés sur plusieurs décennies.","Ses partisans estiment qu'obliger les médecins à s'installer dans les zones sous-dotées est la seule mesure suffisamment efficace pour garantir l'accès aux soins sur l'ensemble du territoire.","Ses opposants estiment que la liberté d'installation est un principe reconnu et que des mesures incitatives sont plus respectueuses de ce principe tout en pouvant être efficaces.","soc"],
["Les données personnelles collectées par les entreprises doivent être soumises à un droit à la portabilité et à l'effacement effectif.","Le RGPD (2018) donne aux citoyens européens des droits sur leurs données. Son application effective par les grandes plateformes fait l'objet de critiques régulières.","Ses partisans estiment que renforcer ces droits redonne aux citoyens un contrôle réel sur leurs informations personnelles et réduit la dépendance vis-à-vis des grandes plateformes.","Ses opposants estiment que les droits existants sont déjà étendus et que leur renforcement risque d'imposer des contraintes excessives aux entreprises, y compris aux plus petites.","num"],
["Le droit à l'avortement doit être inscrit dans la Constitution française pour le protéger définitivement.","L'avortement est légal en France depuis la loi Veil (1975) et a été inscrit dans la Constitution en 2024. Ce débat porte sur la consolidation de ce droit constitutionnel.","Ses partisans estiment que l'inscription constitutionnelle protège définitivement ce droit de toute remise en cause par une majorité parlementaire future.","Ses opposants estiment que la loi ordinaire offrait déjà une protection solide et que constitutionnaliser ce droit introduit des rigidités inutiles ; certains avancent que le droit à la vie mérite d'être mis en balance avec cette inscription.","soc2"]

    const{ag,di}=getDet(k);const conflicts=elim[k]||[];
    const agH=ag.length?ag.map(t=>`<div class="di"><span class="dot" style="background:var(--gk)"></span><span>${t}</span></div>`).join(''):`<div class="di" style="color:var(--t4)">Aucun accord notable</div>`;
    const diH=di.length?di.map(t=>`<div class="di"><span class="dot" style="background:var(--rt)"></span><span>${t}</span></div>`).join(''):`<div class="di" style="color:var(--t4)">Aucun désaccord notable</div>`;
    const conflH=conflicts.length?`<div style="background:var(--rg);border:.5px solid var(--rb);border-radius:9px;padding:12px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--rt);margin-bottom:7px">🔴 Raison${conflicts.length>1?'s':''} d'élimination</div>${conflicts.map(t=>`<div style="font-size:13px;color:var(--rt);line-height:1.6;padding:5px 0;border-bottom:.5px solid var(--rb)">· ${t}</div>`).join('')}</div>`:'';
    const pxH=isPx?`<div style="background:var(--wg);border:.5px solid var(--wb);border-radius:9px;padding:14px;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:var(--wt);margin-bottom:8px">⚠ Paradoxe détecté</div><p style="font-size:13px;color:var(--wt);line-height:1.65"><b>${CV[k].n}</b> est éliminé sur votre ligne rouge, mais affiche <b>${p}% de compatibilité</b>. Le désaccord identifié est-il vraiment rédhibitoire au point d'exclure ${p}% d'accord sur tout le reste ?</p></div>`:'';
    return`<div class="cr${isE?' el':''}${isTop?' tp':''}"><div class="ch2" onclick="tCand('${k}')"><div style="display:flex;align-items:center;gap:8px;min-width:0"><span style="width:9px;height:9px;border-radius:50%;background:${CV[k].c};display:inline-block;flex-shrink:0"></span><span style="font-size:15px;font-weight:${isTop?700:500};color:var(--t1);white-space:nowrap">${CV[k].n}</span><span class="bs" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${CV[k].p}</span>${isE?`<span style="font-size:11px;background:var(--rg);color:var(--rt);padding:2px 7px;border-radius:8px;flex-shrink:0;font-weight:700">éliminé</span>`:''}${isPx?`<span style="font-size:11px;background:var(--wg);color:var(--wt);padding:2px 7px;border-radius:8px;flex-shrink:0">⚠ paradoxe</span>`:''}</div><div style="display:flex;align-items:center;gap:5px;flex-shrink:0"><span style="font-size:16px;font-weight:700;color:${isTop?CV[k].c:'var(--t4)'}">${p}%</span><span id="arr-${k}" style="font-size:11px;color:var(--t4)">▼</span></div></div><div class="bar" style="margin:0 13px 8px"><div class="bf" data-w="${p}" style="background:${CV[k].c};opacity:${isE?.3:isTop?1:.65}"></div></div><div id="det-${k}" class="cd">${conflH}${pxH}<div class="lb" style="margin-bottom:5px">✓ Accords (${ag.length})</div>${agH}<div class="lb" style="margin:10px 0 5px">✗ Désaccords (${di.length})</div>${diH}</div></div>`;
  }).join('');

  const skipSec=skipped.length?`<div style="margin-top:22px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:6px">❓ Sujets non répondus — sources pour se renseigner</div><p class="bs" style="margin-bottom:12px">${skipped.length} sujet${skipped.length>1?'s':''} passé${skipped.length>1?'s':''}.</p>${skipped.map(q=>`<div style="background:var(--ig);border:.5px solid var(--it);border-radius:10px;padding:13px;margin-bottom:9px"><div style="font-size:14px;font-weight:600;color:var(--t1);margin-bottom:6px">${q.th} — ${q.t}</div><p style="font-size:13px;color:var(--t2);line-height:1.65;margin-bottom:10px">${q.ctx}</p>${argRow('pour',q.arg1)}${argRow('contre',q.arg2)}<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:10px">${q.src.map(s=>`<a class="sa" href="${s.u}" target="_blank">→ ${s.l}</a>`).join('')}</div></div>`).join('')}</div>`:'';

  const srcMap={};aQ.forEach(q=>{if(!srcMap[q.th])srcMap[q.th]={th:q.th,src:q.src};});
  const srcH=Object.values(srcMap).map(({th,src})=>`<div style="margin-bottom:11px"><p class="bs" style="font-weight:600;margin-bottom:5px">${th}</p>${src.map(s=>`<a class="sa" href="${s.u}" target="_blank" style="margin-right:14px">→ ${s.l}</a>`).join('')}</div>`).join('');

  $().innerHTML=nav()+simBanner()+`<div><div class="lb" style="margin-bottom:12px">Résultats · ${mode==='quick'?'Test Rapide':mode==='deep'?'Test Complet':'Filtre Décisif'}</div><div class="sc"><div class="lb" style="margin-bottom:6px">Votre tendance politique</div><div style="font-size:24px;font-weight:700;margin-bottom:9px;color:var(--t1);font-family:Georgia,serif">${td.l}</div><p class="bm">${td.d}</p>${skipped.length?`<p class="bs" style="margin-top:7px">${skipped.length} sujet${skipped.length>1?'s':''} passé${skipped.length>1?'s':''} — exclus du calcul</p>`:''}</div><div class="card" style="padding:15px;margin-bottom:15px"><div style="font-size:15px;font-weight:700;margin-bottom:10px;color:var(--t1)">Boussole politique <span style="font-size:11px;font-weight:400;color:var(--simb)">(positions simulées)</span></div>${compass(res.ux,res.uy)}<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:4px;margin-top:10px">${CK.map(k=>`<div style="display:flex;align-items:center;gap:5px;overflow:hidden"><span style="width:7px;height:7px;border-radius:50%;background:${CV[k].c};flex-shrink:0;display:inline-block"></span><span class="bs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${CV[k].n.split(' ').slice(-1)[0]}</span></div>`).join('')}</div></div><div style="font-size:15px;font-weight:700;margin-bottom:6px;color:var(--t1)">Compatibilité par candidat <span style="font-size:11px;font-weight:400;color:var(--simb)">(simulation)</span></div><p class="bs" style="margin-bottom:10px">Cliquez pour voir accords, désaccords, lignes rouges et paradoxes.</p>${candsH}${skipSec}<div class="card" style="margin-top:16px;padding:15px"><div style="font-size:15px;font-weight:700;color:var(--t1);margin-bottom:12px">📚 Sources par thème</div>${srcH}</div><div style="margin-top:14px;padding:13px;background:var(--c2);border-radius:11px"><p class="bs" style="line-height:1.7"><b style="color:var(--t2)">Méthodologie</b> — ${aQ.length} questions / ${thCount} thèmes. Compatibilité = 1 − |vote − position_candidat| / 4. Positions des candidats : simulation provisoire — à 0 (neutre) en attendant les programmes officiels. Projet indépendant, aucune orientation d'opinion.</p></div><div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap"><a href="https://github.com/" target="_blank" class="se" style="text-decoration:none">↗ Code source (GitHub)</a><button class="se" onclick="gH()">↩ Recommencer</button></div></div>${civic()}`;
  setTimeout(()=>{document.querySelectorAll('.bf').forEach(e=>{e.style.width=e.dataset.w+'%';});},100);}

function tCand(k){const e=document.getElementById('det-'+k),a=document.getElementById('arr-'+k);if(e){e.classList.toggle('op');if(a)a.textContent=e.classList.contains('op')?'▲':'▼';}}
R();
</script>
</body>
</html>
